<script>
// ═══════════════════════════════════════════════════════════════
// INGRESOS ADICIONALES DE EFECTIVO (Caja Diaria)
// ═══════════════════════════════════════════════════════════════
let ingresosActuales = [];

function addIngreso() {
  const idx = ingresosActuales.length;
  ingresosActuales.push({ descripcion:'', monto_crc:0, monto_usd:0 });
  const wrap = document.getElementById('ingresos-wrap');
  if (!wrap) return;
  const div = document.createElement('div');
  div.id = 'ingreso-' + idx;
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:10px;background:#f0f9f2;border-radius:2px;border:1px solid #b0d8b8';
  div.innerHTML = `
    <input class="form-input" placeholder="Descripción (ej: Venta aceite usado, Ingreso varios...)"
      oninput="ingresosActuales[${idx}].descripcion=this.value" style="flex:2;min-width:180px">
    <div class="monto-wrap" style="width:160px">
      <span class="monto-prefix">₡</span>
      <input class="form-input" type="number" placeholder="0"
        oninput="ingresosActuales[${idx}].monto_crc=+this.value;recalcTotales()">
    </div>
    <div class="monto-wrap usd" style="width:140px">
      <span class="monto-prefix">$</span>
      <input class="form-input" type="number" placeholder="0"
        oninput="ingresosActuales[${idx}].monto_usd=+this.value;recalcTotales()">
    </div>
    <button class="btn btn-ghost btn-sm" onclick="removeIngreso(${idx})"
      style="color:var(--red);border-color:#f0b0b0">×</button>
  `;
  wrap.appendChild(div);
  document.getElementById('total-ingresos-bar').style.display = 'block';
  recalcTotales();
}

function removeIngreso(idx) {
  ingresosActuales[idx] = null;
  const el = document.getElementById('ingreso-' + idx);
  if (el) el.remove();
  const remaining = ingresosActuales.filter(i=>i);
  if (!remaining.length) document.getElementById('total-ingresos-bar').style.display = 'none';
  recalcTotales();
}

// ═══════════════════════════════════════════════════════════════
// CIERRE DE TURNO (Manager)
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// CIERRE DEL DÍA (encargado — una vez al día, al cierre noche)
// ═══════════════════════════════════════════════════════════════
function renderCierreTurno(el) {
  const empList = EMPLEADOS.length ? EMPLEADOS
    : ['Alan','Dolores','GUIDO','GUILLE','Ignacio','Jaime','Joaquina','Jota','Maxi','Nacho','ROSAURA M','Rocio'];
  const empOpts = empList.map(e=>`<option value="${e}">${e}</option>`).join('');
  const hoy  = new Date().toISOString().slice(0,10);
  const tc   = TIPO_CAMBIO || 530;

  // Saldo CF anterior — del último cierre registrado
  const ultCierre = [...CIERRES_TURNO]
    .sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''))[0];
  // Si el último cierre tiene datos reales de remanente, usarlos
  // Si no (cierre vacío o datos en 0), usar el saldo inicial configurado
  const tieneRemanente = ultCierre && (ultCierre.remanente_crc > 0 || ultCierre.total_contado_crc > 0);
  const cfAnteriorCRC = tieneRemanente ? (ultCierre.remanente_crc || 0) : (CF_SALDO_INICIAL || 0);
  const cfAnteriorUSD = tieneRemanente ? (ultCierre.remanente_usd || 0) : (CF_SALDO_INICIAL_USD || 0);

  // Pagos efectivo del día desde MOVIMIENTOS
  const pagosDia = MOVIMIENTOS.filter(m =>
    m.fecha === hoy &&
    m.tipo === 'Egreso' &&
    m.metodo === 'Efectivo' &&
    m.estado === 'Pagado' &&
    m.categoria === 'Egreso - Mercadería'
  );
  const pagosEfCRC = pagosDia.reduce((s,m)=>s+(m.monto_crc||0), 0);

  el.innerHTML = `
    <style>
      .cd2-sec { background:#fff; border:1px solid var(--border); border-radius:3px; margin-bottom:14px; overflow:hidden; }
      .cd2-head { padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border);
        display:flex; align-items:center; justify-content:space-between; }
      .cd2-title { font-size:9px; letter-spacing:.2em; text-transform:uppercase; font-weight:700; color:#4a4030; }
      .cd2-body { padding:18px 20px; }
      .turno-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
      .turno-card { padding:14px 16px; background:var(--panel); border-radius:2px; }
      .turno-card-am { border-top:2px solid #c8a030; }
      .turno-card-pm { border-top:2px solid #4a7c59; }
      .turno-label { font-size:10px; font-weight:700; margin-bottom:12px; }
      .turno-label.am { color:#a07030; }
      .turno-label.pm { color:#2a6a4a; }
      .ef-real-box { background:#fff; border:1px solid var(--border); border-radius:2px; padding:8px 12px;
        margin:8px 0 10px; }
      .ef-real-formula { font-size:9px; color:#888; margin-bottom:3px; }
      .ef-real-val { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:#4a2a8a; }
      .conteo-tbl { width:100%; border-collapse:collapse; }
      .conteo-tbl th { padding:7px 14px; font-size:8px; letter-spacing:.12em; text-transform:uppercase;
        color:#888; font-weight:500; background:var(--panel); text-align:left; }
      .conteo-tbl th:not(:first-child) { text-align:center; }
      .conteo-tbl td { padding:0; border-top:1px solid var(--border); }
      .conteo-lbl { padding:12px 14px; font-size:11px; font-weight:600; }
      .conteo-lbl-sub { font-size:9px; color:#888; font-weight:400; margin-top:2px; }
      .conteo-inp-cell { padding:8px 10px; border-left:1px solid var(--border); }
      .conteo-inp { width:100%; border:1px solid var(--border); border-radius:2px; padding:7px 10px;
        font-family:'DM Mono',monospace; font-size:13px; background:#fff; outline:none; text-align:right; }
      .conteo-inp:focus { border-color:var(--gold); }
      .conteo-inp.purple { border-color:#9a7add; color:#4a2a8a; font-weight:700; }
      .conteo-total td { background:var(--ink); font-family:'Syne',sans-serif; font-weight:700;
        font-size:13px; color:var(--gold); padding:10px 14px; border-top:2px solid #2a2a2a; }
      .ver-row { display:flex; justify-content:space-between; align-items:center;
        padding:7px 0; border-bottom:1px solid var(--border); font-size:12px; }
      .ver-row:last-child { border-bottom:none; }
      .ver-lbl { color:#888; }
      .ver-val { font-weight:700; font-family:'Syne',sans-serif; }
      .ver-neg { color:var(--red); }
      .ver-der { color:#4a2a8a; }
      .ver-result { border-radius:2px; padding:16px 20px; margin-top:12px;
        display:flex; justify-content:space-between; align-items:center; }
      .ver-result.ok  { background:#f0f9f2; border:2px solid #4a7c59; }
      .ver-result.err { background:#fff5f5; border:2px solid var(--red); }
      .ver-dif-label { font-size:9px; letter-spacing:.2em; text-transform:uppercase; font-weight:700; margin-bottom:4px; }
      .ver-dif-num { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; }
      .ok .ver-dif-label { color:#2a5a3a; }
      .ok .ver-dif-num   { color:#2a7a4a; }
      .err .ver-dif-label { color:#8a2222; }
      .err .ver-dif-num   { color:var(--red); }
      .cf-anterior-bar { padding:10px 16px; background:var(--panel);
        border:1px solid var(--border); border-radius:2px; margin-bottom:14px;
        display:flex; justify-content:space-between; align-items:center; font-size:11px; }
    </style>

    <div style="max-width:760px;margin:0 auto">

      <!-- Tipo de cambio visible -->
      <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);
        border:1px solid var(--border);border-radius:2px;margin-bottom:14px;font-size:10px">
        <span style="color:#888">Tipo de cambio:</span>
        <strong>₡ ${tc.toLocaleString('es-CR')} por $1</strong>

      </div>

      <!-- Saldo CF anterior -->
      <div class="cf-anterior-bar">
        <div>
          <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:3px">
            Saldo Caja Fuerte al inicio del día
          </div>
          <div style="font-size:9px;color:#555">
            ${ultCierre ? 'Remanente del cierre: ' + ultCierre.fecha : 'Saldo inicial configurado'}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">${fi(cfAnteriorCRC)}</div>
          ${cfAnteriorUSD > 0 ? `<div style="font-size:13px;color:#7ab4d4;font-weight:700">${fd(cfAnteriorUSD)}</div>` : ''}
        </div>
      </div>

      <!-- 1. Identificación -->
      <div class="cd2-sec">
        <div class="cd2-head"><span class="cd2-title">1 · Identificación</span></div>
        <div class="cd2-body">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">Encargado</label>
              <select class="form-select" id="ct-manager">
                <option value="">-- Seleccioná --</option>${empOpts}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Fecha</label>
              <input class="form-input" type="date" id="ct-fecha" value="${hoy}">
            </div>
            <div class="form-group">
              <label class="form-label">Notas del día</label>
              <input class="form-input" id="ct-notas" placeholder="Observaciones generales...">
            </div>
          </div>
        </div>
      </div>

      <!-- 2. Ventas y egresos — mediodía y noche -->
      <div class="cd2-sec">
        <div class="cd2-head">
          <span class="cd2-title">2 · Ventas y egresos del día</span>
          <span style="font-size:9px;color:#888">Mediodía y noche con su propia contabilización</span>
        </div>

          <div class="turno-grid">

            <!-- Mediodía -->
            <div class="turno-card turno-card-am">
              <div class="turno-label am">Mediodía</div>
              <div class="form-group" style="margin-bottom:10px">
                <label class="form-label">Ventas PoS ₡</label>
                <div class="monto-wrap">
                  <span class="monto-prefix">₡</span>
                  <input class="form-input" type="number" id="ct-vm-crc" placeholder="0" oninput="recalcCierre()" style="font-size:15px;padding:9px 9px 9px 28px">
                </div>
              </div>
              <div class="form-group" style="margin-bottom:8px">
                <label class="form-label">Dólares físicos recibidos $</label>
                <div class="monto-wrap usd">
                  <span class="monto-prefix">$</span>
                  <input class="form-input" type="number" id="ct-vm-usd" placeholder="0" oninput="recalcCierre()" style="font-size:15px;padding:9px 9px 9px 28px">

                <div class="ef-real-formula" id="ct-vm-formula">Efectivo real ₡ mediodía</div>
                <div class="ef-real-val" id="ct-vm-real">₡ 0</div>
              </div>
              <div class="form-group" style="margin-bottom:10px">
                <label class="form-label">Propinas mediodía ₡</label>

// RECALC CIERRE — nueva fórmula unificada
// ═══════════════════════════════════════════════════════════════
function recalcCierre() {
  const v  = id => +document.getElementById(id)?.value || 0;
  const tc = TIPO_CAMBIO || 530;

  // Ventas
  const vmCRC = v('ct-vm-crc'), vmUSD = v('ct-vm-usd'); // mediodía
  const vnCRC = v('ct-vn-crc'), vnUSD = v('ct-vn-usd'); // noche

  // Egresos
  const pmCRC = v('ct-pm-crc'), emCRC = v('ct-em-crc'); // propinas+otros mediodía
  const pnCRC = v('ct-pn-crc'), enCRC = v('ct-en-crc'); // propinas+otros noche

  // Conteo físico
  const sepDCRC = v('ct-sep-d-crc'), sepDUSD = v('ct-sep-d-usd'); // Caja Diaria mañana
  const sepRCRC = v('ct-sep-r-crc'), sepRUSD = v('ct-sep-r-usd'); // Registradora mañana
  const remCRC  = v('ct-rem-crc'),   remUSD  = v('ct-rem-usd');   // Remanente CF

  // Pagos proveedores en efectivo del día (de MOVIMIENTOS)
  const hoy = document.getElementById('ct-fecha')?.value || new Date().toISOString().slice(0,10);
  const pagosEfCRC = MOVIMIENTOS
    .filter(m => m.fecha===hoy && m.tipo==='Egreso' && m.metodo==='Efectivo' &&
                 m.estado==='Pagado' && m.categoria==='Egreso - Mercadería')
    .reduce((s,m)=>s+(m.monto_crc||0), 0);

  // Efectivo real por turno
  const efRealMCRC = vmCRC - (vmUSD * tc);
  const efRealNCRC = vnCRC - (vnUSD * tc);
  const efRealTotalUSD = vmUSD + vnUSD;

  // Actualizar displays de efectivo real
  const updEf = (idF, idV, crc, ventasCRC, dolares) => {
    const f = document.getElementById(idF);
    const v = document.getElementById(idV);
    if (f) f.textContent = dolares > 0
      ? `${fi(ventasCRC)} − ($${dolares} × ₡${tc.toLocaleString('es-CR')}) = ${fi(crc)}`
      : 'Sin dólares — total directo en colones';
    if (v) v.textContent = fi(crc);
  };
  updEf('ct-vm-formula','ct-vm-real', efRealMCRC, vmCRC, vmUSD);
  updEf('ct-vn-formula','ct-vn-real', efRealNCRC, vnCRC, vnUSD);

  // Total contado = Caja Diaria mañana + Caja Registradora mañana + Remanente CF
  const totalContadoCRC = sepDCRC + sepRCRC + remCRC;
  const totalContadoUSD = sepDUSD + sepRUSD + remUSD;

  // Total el que debería haber = CF anterior + Ventas reales - Egresos - Pagos proveedores
  // NOTA: La Caja Registradora mañana ya está "dentro" del efectivo del día, no se resta
  const ultCierre = [...CIERRES_TURNO].sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''))[0];
  const tieneRemCalc = ultCierre && (ultCierre.remanente_crc > 0 || ultCierre.total_contado_crc > 0);
  const cfAnteriorCRC = tieneRemCalc ? (ultCierre.remanente_crc||0) : (CF_SALDO_INICIAL||0);
  const cfAnteriorUSD = ultCierre ? (ultCierre.remanente_usd||0) : 0;

  const deberiaHaberCRC = cfAnteriorCRC + efRealMCRC + efRealNCRC - pmCRC - emCRC - pnCRC - enCRC - pagosEfCRC;
  const deberiaHaberUSD = cfAnteriorUSD + efRealTotalUSD;

  // Diferencia
  const difCRC = totalContadoCRC - deberiaHaberCRC;
  const difUSD = totalContadoUSD - deberiaHaberUSD;
  const cuadra = Math.abs(difCRC) < 500 && (efRealTotalUSD === 0 || Math.abs(difUSD) < 0.5);

  // Actualizar total contado
  const tcEl = document.getElementById('ct-total-crc');
  const tuEl = document.getElementById('ct-total-usd');
  if (tcEl) tcEl.textContent = fi(totalContadoCRC);
  if (tuEl) tuEl.textContent = totalContadoUSD > 0 ? fd(totalContadoUSD) : '';

  // Mostrar/ocultar ajuste
  const ajWrap = document.getElementById('ct-ajuste-wrap');
  if (ajWrap) ajWrap.style.display = cuadra ? 'none' : 'block';

  // Verificación
  const secVer = document.getElementById('ct-verificacion');
  const body   = document.getElementById('ct-ver-body');
  const titulo = document.getElementById('ct-ver-titulo');
  const hayDatos = (vmCRC||vnCRC||totalContadoCRC) > 0;
  if (!secVer || !body) return;

  if (!hayDatos) { secVer.style.display = 'none'; return; }
  secVer.style.display = 'block';

  if (titulo) {
    titulo.textContent = cuadra ? '4 · Verificación ✓ CUADRA' : '4 · Verificación ⚠ DIFERENCIA';
    titulo.style.color = cuadra ? 'var(--green)' : 'var(--red)';
  }

  body.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">

      <!-- LO QUE DEBERÍA HABER -->
      <div>
        <div style="font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#888;margin-bottom:8px;font-weight:700">LO QUE DEBERÍA HABER</div>
        <div style="background:var(--panel);border-radius:2px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">CF inicio del día</span>
            <span style="font-weight:700">${fi(cfAnteriorCRC)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">+ Efectivo real mediodía</span>
            <span style="font-weight:700;color:#4a2a8a">${fi(efRealMCRC)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">+ Efectivo real noche</span>
            <span style="font-weight:700;color:#4a2a8a">${fi(efRealNCRC)}</span>
          </div>
          ${(pmCRC+emCRC+pnCRC+enCRC) > 0 ? `<div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">− Propinas y egresos</span>
            <span style="font-weight:700;color:var(--red)">− ${fi(pmCRC+emCRC+pnCRC+enCRC)}</span>
          </div>` : ''}
          ${pagosEfCRC > 0 ? `<div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">− Pagos proveedores efectivo</span>
            <span style="font-weight:700;color:var(--red)">− ${fi(pagosEfCRC)}</span>
          </div>` : ''}
          <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--ink)">
            <span style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#555">Total debería haber</span>
            <span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--gold)">${fi(deberiaHaberCRC)}</span>
          </div>
        </div>
        ${efRealTotalUSD > 0 ? `<div style="margin-top:6px;padding:8px 12px;background:var(--panel);border-radius:2px;font-size:10px;display:flex;justify-content:space-between">
          <span style="color:#888">Debería haber $</span>
          <span style="font-weight:700;color:#7ab4d4">${fd(deberiaHaberUSD)}</span>
        </div>` : ''}
      </div>

      <!-- LO QUE CONTASTE -->
      <div>
        <div style="font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#888;margin-bottom:8px;font-weight:700">LO QUE CONTASTE</div>
        <div style="background:var(--panel);border-radius:2px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">Caja Diaria mañana</span>
            <span style="font-weight:700">${fi(sepDCRC)}${sepDUSD?` / ${fd(sepDUSD)}`:''}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">Caja Registradora mañana</span>
            <span style="font-weight:700">${fi(sepRCRC)}${sepRUSD?` / ${fd(sepRUSD)}`:''}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
            <span style="color:#888">Remanente Caja Fuerte</span>
            <span style="font-weight:700;color:#4a2a8a">${fi(remCRC)}${remUSD?` / ${fd(remUSD)}`:''}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--ink)">
            <span style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#555">Total contado</span>
            <span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--gold)">${fi(totalContadoCRC)}</span>
          </div>
        </div>
        ${totalContadoUSD > 0 ? `<div style="margin-top:6px;padding:8px 12px;background:var(--panel);border-radius:2px;font-size:10px;display:flex;justify-content:space-between">
          <span style="color:#888">Total contado $</span>
          <span style="font-weight:700;color:#7ab4d4">${fd(totalContadoUSD)}</span>
        </div>` : ''}
      </div>
    </div>

    <!-- DIFERENCIA — bloque principal -->
    <div style="border-radius:2px;overflow:hidden;border:3px solid ${cuadra?'#4a7c59':'var(--red)'}">
      <div style="padding:10px 16px;background:${cuadra?'#4a7c59':'var(--red)'};text-align:center">
        <div style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#fff;font-weight:700">
          ${cuadra ? '✓ CUADRA CORRECTAMENTE'
            : difCRC > 0 ? '↑ HAY MÁS EFECTIVO DEL ESPERADO'
            : '↓ FALTA EFECTIVO — REVISÁ LOS MONTOS'}
        </div>
      </div>
      <div style="padding:20px;background:${cuadra?'#f0f9f2':'#fff5f5'};display:flex;justify-content:space-evenly;align-items:center;flex-wrap:wrap;gap:16px">
        <div style="text-align:center">
          <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:6px">Diferencia ₡</div>
          <div style="font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:${cuadra?'var(--green)':'var(--red)'}">
            ${difCRC >= 0 ? '+' : ''}${fi(difCRC)}
          </div>
        </div>
        ${efRealTotalUSD > 0 ? `<div style="text-align:center">
          <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:6px">Diferencia $</div>
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${Math.abs(difUSD)<0.5?'var(--green)':'var(--red)'}">
            ${difUSD >= 0 ? '+' : ''}${fd(difUSD)}
          </div>
        </div>` : ''}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// CONFIRMAR CIERRE DEL DÍA
// ═══════════════════════════════════════════════════════════════
async function confirmarCierreTurnoManager() {
  const manager = document.getElementById('ct-manager')?.value;
  const fecha   = document.getElementById('ct-fecha')?.value;
  if (!manager) { showToast('Seleccioná el encargado', 'error'); return; }

  // Validar ajuste si hay diferencia
  const ajWrap = document.getElementById('ct-ajuste-wrap');
  if (ajWrap && ajWrap.style.display !== 'none') {
    const motivo = document.getElementById('ct-ajuste-motivo')?.value?.trim();
    if (!motivo) {
      showToast('El motivo de la diferencia es obligatorio', 'error');
      document.getElementById('ct-ajuste-motivo')?.focus();
      return;
    }
  }

  const v = id => +document.getElementById(id)?.value || 0;
  const tc = TIPO_CAMBIO || 530;

  const vmCRC=v('ct-vm-crc'), vmUSD=v('ct-vm-usd');
  const vnCRC=v('ct-vn-crc'), vnUSD=v('ct-vn-usd');
  const pmCRC=v('ct-pm-crc'), emCRC=v('ct-em-crc');
  const pnCRC=v('ct-pn-crc'), enCRC=v('ct-en-crc');
  const sepDCRC=v('ct-sep-d-crc'), sepDUSD=v('ct-sep-d-usd');
  const sepRCRC=v('ct-sep-r-crc'), sepRUSD=v('ct-sep-r-usd');
  const remCRC=v('ct-rem-crc'),    remUSD=v('ct-rem-usd');

  const efRealMCRC = vmCRC - (vmUSD * tc);
  const efRealNCRC = vnCRC - (vnUSD * tc);
  const efRealUSD  = vmUSD + vnUSD;
  const totalContadoCRC = sepDCRC + sepRCRC + remCRC;
  const totalContadoUSD = sepDUSD + sepRUSD + remUSD;

  const ultCierre = [...CIERRES_TURNO].sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''))[0];
  const cfAnteriorCRC = ultCierre ? (ultCierre.remanente_crc||0) : (CF_SALDO_INICIAL||0);
  const pagosEfCRC = MOVIMIENTOS
    .filter(m=>m.fecha===fecha&&m.tipo==='Egreso'&&m.metodo==='Efectivo'&&m.estado==='Pagado'&&m.categoria==='Egreso - Mercadería')
    .reduce((s,m)=>s+(m.monto_crc||0),0);

  const deberiaHaberCRC = cfAnteriorCRC + efRealMCRC + efRealNCRC - pmCRC - emCRC - pnCRC - enCRC - pagosEfCRC;
  const difCRC = totalContadoCRC - deberiaHaberCRC;
  const difUSD = totalContadoUSD - (cfAnteriorCRC >= 0 ? efRealUSD : 0);

  const data = {
    id: 'cd_' + Date.now(), fecha, manager,
    tipo_cambio: tc,
    // Mediodía
    vm_crc: vmCRC, vm_usd: vmUSD, ef_real_m_crc: efRealMCRC,
    propinas_m_crc: pmCRC, otros_m_crc: emCRC,
    // Noche
    vn_crc: vnCRC, vn_usd: vnUSD, ef_real_n_crc: efRealNCRC,
    propinas_n_crc: pnCRC, otros_n_crc: enCRC,
    // Conteo
    sep_diaria_crc: sepDCRC, sep_diaria_usd: sepDUSD,
    sep_reg_crc: sepRCRC, sep_reg_usd: sepRUSD,
    remanente_crc: remCRC, remanente_usd: remUSD,
    total_contado_crc: totalContadoCRC, total_contado_usd: totalContadoUSD,
    // Calculados
    cf_anterior_crc: cfAnteriorCRC,
    deberia_haber_crc: deberiaHaberCRC,
    diferencia_crc: difCRC, diferencia_usd: difUSD,
    pagos_efectivo_dia: pagosEfCRC,
    notas: document.getElementById('ct-notas')?.value || '',
    timestamp: new Date().toISOString()
  };

  // Movimientos automáticos desde el cierre
  const movsNuevos = [];
  const ts = data.timestamp;

  // Ventas mediodía
  if (vmCRC || vmUSD) movsNuevos.push({
    id: data.id+'_vm', fecha, turno:'Mediodía', tipo:'Ingreso', categoria:'Ingreso',
    subcategoria: 'Ventas efectivo mediodía',
    empleado_nombre: manager, monto_crc: efRealMCRC, monto_usd: vmUSD,
    metodo:'Efectivo', caja_origen:'Caja Fuerte', estado:'Pagado',
    notas: `PoS: ${fi(vmCRC)}${vmUSD?' / $'+vmUSD:''}`, timestamp: ts
  });
  // Ventas noche
  if (vnCRC || vnUSD) movsNuevos.push({
    id: data.id+'_vn', fecha, turno:'Noche', tipo:'Ingreso', categoria:'Ingreso',
    subcategoria: 'Ventas efectivo noche',
    empleado_nombre: manager, monto_crc: efRealNCRC, monto_usd: vnUSD,
    metodo:'Efectivo', caja_origen:'Caja Fuerte', estado:'Pagado',
    notas: `PoS: ${fi(vnCRC)}${vnUSD?' / $'+vnUSD:''}`, timestamp: ts
  });
  // Propinas mediodía
  if (pmCRC) movsNuevos.push({
    id: data.id+'_pm', fecha, turno:'Mediodía', tipo:'Egreso', categoria:'Egreso - Personal',
    subcategoria:'Propinas por tarjeta', empleado_nombre: manager,
    monto_crc: pmCRC, monto_usd:0, metodo:'Efectivo', caja_origen:'Caja Fuerte',
    estado:'Pagado', notas:'Cierre · '+manager, timestamp: ts
  });
  // Propinas noche
  if (pnCRC) movsNuevos.push({
    id: data.id+'_pn', fecha, turno:'Noche', tipo:'Egreso', categoria:'Egreso - Personal',
    subcategoria:'Propinas por tarjeta', empleado_nombre: manager,
    monto_crc: pnCRC, monto_usd:0, metodo:'Efectivo', caja_origen:'Caja Fuerte',
    estado:'Pagado', notas:'Cierre · '+manager, timestamp: ts
  });
  // Otros egresos
  if (emCRC) movsNuevos.push({
    id: data.id+'_em', fecha, turno:'Mediodía', tipo:'Egreso', categoria:'Egreso - Operativo',
    subcategoria:'Otros egresos turno', empleado_nombre: manager,
    monto_crc: emCRC, monto_usd:0, metodo:'Efectivo', caja_origen:'Caja Fuerte',
    estado:'Pagado', notas:'Cierre · '+manager, timestamp: ts
  });
  if (enCRC) movsNuevos.push({
    id: data.id+'_en', fecha, turno:'Noche', tipo:'Egreso', categoria:'Egreso - Operativo',
    subcategoria:'Otros egresos turno', empleado_nombre: manager,
    monto_crc: enCRC, monto_usd:0, metodo:'Efectivo', caja_origen:'Caja Fuerte',
    estado:'Pagado', notas:'Cierre · '+manager, timestamp: ts
  });
  // Ajuste si hay diferencia
  const ajWrapFin = document.getElementById('ct-ajuste-wrap');
  if (ajWrapFin && ajWrapFin.style.display !== 'none') {
    const ajTipo  = document.getElementById('ct-ajuste-tipo')?.value || 'Faltante';
    const ajMotiv = document.getElementById('ct-ajuste-motivo')?.value?.trim() || '';
    movsNuevos.push({
      id: data.id+'_ajuste', fecha, turno:'Cierre', tipo:'Ajuste', categoria:'Ajuste',
      subcategoria: ajTipo, empleado_nombre: manager,
      monto_crc: difCRC, monto_usd: 0, metodo:'Efectivo', caja_origen:'Caja Fuerte',
      estado:'Pagado', notas:'Cierre · '+ajTipo+' · '+ajMotiv, timestamp: ts
    });
  }

  // Guardar todo
  CIERRES_TURNO.push(data);
  movsNuevos.forEach(m => MOVIMIENTOS.push(m));
  localStorage.setItem('caja_cierres',     JSON.stringify(CIERRES_TURNO));
  localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));

  showToast('Guardando cierre del día...', '');
  const r = await apiPost({ action:'saveCierreTurno', data: JSON.stringify(data) });
  for (const m of movsNuevos) await apiPost({ action:'saveMovimiento', data: JSON.stringify(m) });

  if (r?.ok) showToast('✓ Cierre del día guardado', 'success');
  else showToast('⚠ Guardado local · sin conexión', 'error');

  APERTURA_CONFIRMADA = false;
  renderCierreTurno(el);
}


</script>
