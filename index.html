<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satori · Caja</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0d0d; --paper: #f5f0e8; --gold: #c8a96e; --red: #c23b22;
  --green: #4a7c59; --border: #d4cfc4; --panel: #ede8de; --muted: #8a8070;
  --blue: #2a4a6b; --gold-dim: #c8a96e30;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--paper); color:var(--ink); font-family:'DM Mono',monospace; min-height:100vh; }

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; height:52px; background:var(--ink);
  border-bottom:1px solid #1a1a1a; position:sticky; top:0; z-index:200;
}
.logo { font-family:'Shippori Mincho',serif; font-size:17px; font-weight:700; color:var(--gold); letter-spacing:.1em; }
.logo-sub { font-size:8px; letter-spacing:.3em; color:#444; text-transform:uppercase; margin-left:10px; }
.header-right { display:flex; align-items:center; gap:12px; }
.sync-badge { font-size:9px; color:#555; cursor:pointer; }
.sync-badge.ok { color:var(--green); }
.sync-badge.err { color:var(--red); }

/* ── NAV ── */
.nav-tabs {
  display:flex; background:var(--panel); border-bottom:2px solid var(--border);
  padding:0 24px; overflow-x:auto; gap:0;
}
.nav-tab {
  padding:13px 20px; cursor:pointer; font-size:9px; letter-spacing:.1em;
  text-transform:uppercase; border-bottom:2px solid transparent;
  margin-bottom:-2px; color:#7a7060; transition:all .15s; white-space:nowrap; font-weight:600;
}
.nav-tab:hover { color:var(--ink); }
.nav-tab.active { color:var(--red); border-bottom-color:var(--red); font-weight:700; }

/* ── MAIN ── */
.main { padding:28px 32px; max-width:1400px; margin:0 auto; }
.view { display:none; }
.view.active { display:block; animation:fadeUp .2s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── SECTION LABEL ── */
.sl { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:#4a4030;
  margin-bottom:18px; display:flex; align-items:center; gap:10px; font-weight:700; }
.sl::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── CARDS ── */
.card { background:var(--ink); border-radius:2px; padding:20px 24px; margin-bottom:16px; }
.card-light { background:#fff; border:1px solid var(--border); border-radius:2px; padding:20px 24px; margin-bottom:16px; }

/* ── FORM ELEMENTS ── */
.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:7px; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); font-weight:600; }
.form-input, .form-select {
  border:1px solid var(--border); padding:9px 12px;
  font-family:'DM Mono',monospace; font-size:11px; background:var(--paper);
  border-radius:2px; outline:none; color:var(--ink); transition:border .15s;
}
.form-input:focus, .form-select:focus { border-color:var(--gold); }
.form-input.dark, .form-select.dark {
  background:#0a0a0a; border-color:#2a2a2a; color:#f0ece4;
}
.form-input.dark:focus, .form-select.dark:focus { border-color:var(--gold); }

/* Montos con prefijo moneda */
.monto-wrap { position:relative; }
.monto-prefix {
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  font-size:10px; font-weight:700; color:#555; pointer-events:none;
}
.monto-wrap .form-input { padding-left:30px; }
.monto-wrap.usd .monto-prefix { color:#4a7c59; }

/* ── BOTONES ── */
.btn { display:inline-flex; align-items:center; gap:7px; padding:9px 20px;
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.15em;
  text-transform:uppercase; cursor:pointer; border-radius:2px; border:none;
  font-weight:700; transition:all .15s; }
.btn-primary { background:var(--ink); color:var(--gold); }
.btn-primary:hover { background:#1a1a1a; }
.btn-green { background:var(--green); color:#fff; }
.btn-green:hover { background:#3a6a49; }
.btn-red { background:var(--red); color:#fff; }
.btn-red:hover { background:#a02d1a; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
.btn-ghost:hover { border-color:var(--ink); color:var(--ink); }
.btn-sm { padding:5px 12px; font-size:8px; }
.btn-add {
  width:100%; padding:10px; border:2px dashed var(--border); background:none;
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--muted); cursor:pointer; border-radius:2px;
  transition:all .15s; margin-top:8px;
}
.btn-add:hover { border-color:var(--gold); color:var(--gold); }

/* ── KPI SALDOS ── */
.saldos-bar {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px; margin-bottom:24px;
}
.saldo-card {
  background:var(--ink); padding:14px 16px; border-radius:2px;
  border-left:3px solid var(--gold);
}
.saldo-card.blue { border-left-color:#5a8ab0; }
.saldo-card.green { border-left-color:var(--green); }
.saldo-card.red { border-left-color:var(--red); }
.saldo-label { font-size:7px; letter-spacing:.2em; text-transform:uppercase; color:#555; margin-bottom:6px; }
.saldo-val { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--gold); line-height:1; }
.saldo-val.green { color:#7ec8a0; }
.saldo-val.usd { color:#7ab4d4; font-size:13px; margin-top:3px; }

/* ── PAGO ROW (en cierre turno) ── */
.pago-row {
  background:#111; border:1px solid #1a1a1a; border-radius:2px;
  padding:14px 16px; margin-bottom:10px; position:relative;
}
.pago-row-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.pago-proveedor-badge { font-size:9px; letter-spacing:.1em; font-weight:700; color:var(--gold); }
.pago-cat-badge { font-size:8px; color:#555; }
.pago-montos { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:8px; }
.btn-remove-pago {
  background:none; border:none; color:#444; font-size:16px; cursor:pointer;
  padding:2px 6px; transition:color .15s;
}
.btn-remove-pago:hover { color:var(--red); }

/* ── TABLA ── */
.tbl { width:100%; border-collapse:collapse; font-size:11px; }
.tbl thead tr { background:var(--ink); color:#aaa; }
.tbl thead th { padding:9px 12px; text-align:left; font-size:8px; letter-spacing:.18em; text-transform:uppercase; font-weight:500; }
.tbl thead th.r { text-align:right; }
.tbl tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
.tbl tbody tr:hover { background:var(--panel); }
.tbl td { padding:10px 12px; font-size:11px; }
.tbl td.r { text-align:right; font-family:'Syne',sans-serif; font-weight:700; }
.tbl-wrap { overflow-x:auto; margin-bottom:24px; }

/* ── BADGE STATUS ── */
.badge { font-size:7px; letter-spacing:.2em; text-transform:uppercase; padding:3px 9px; border-radius:1px; font-weight:700; }
.badge-green { background:#e8f3ec; color:var(--green); }
.badge-red { background:#fdf0ee; color:var(--red); }
.badge-gold { background:#fdf7ec; color:#a07830; }

/* ── SEMAFORO PENDIENTES ── */
.semaforo { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.semaforo.rojo { background:var(--red); }
.semaforo.amarillo { background:#c8a030; }
.semaforo.verde { background:var(--green); }

/* ── FILTROS BAR ── */
.filters-bar {
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  padding:12px 16px; background:var(--panel); border:1px solid var(--border);
  border-radius:2px; margin-bottom:20px;
}
.filters-bar label { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:#666; }

/* ── RESUMEN TABLA ── */
.resumen-section { margin-bottom:8px; }
.resumen-section-hdr {
  background:var(--ink); color:var(--gold); padding:8px 14px;
  font-size:8px; letter-spacing:.2em; text-transform:uppercase; font-weight:700;
}
.resumen-row { display:grid; grid-template-columns:1fr 140px 120px; padding:8px 14px;
  border-bottom:1px solid var(--border); font-size:11px; align-items:center; }
.resumen-row:hover { background:var(--panel); }
.resumen-row.total {
  background:var(--ink); color:var(--gold); font-weight:700;
  font-family:'Syne',sans-serif;
}
.resumen-row.resultado {
  background:#0a1a0a; color:#7ec8a0; font-weight:800;
  font-family:'Syne',sans-serif; font-size:13px;
}
.resumen-val { text-align:right; font-family:'Syne',sans-serif; font-weight:700; }
.resumen-val.neg { color:var(--red); }
.resumen-val.pos { color:#7ec8a0; }
.resumen-val.usd { color:#7ab4d4; font-size:10px; }

/* ── CAJERO VIEW (modo simple) ── */
.cajero-wrap {
  max-width:680px; margin:0 auto;
}
.cajero-header {
  background:var(--ink); padding:24px 28px; border-radius:2px 2px 0 0;
  border-bottom:3px solid var(--gold);
}
.cajero-logo { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--gold); }
.cajero-sub { font-size:9px; letter-spacing:.2em; color:#444; text-transform:uppercase; margin-top:4px; }
.cajero-body { background:#fff; border:1px solid var(--border); border-top:none; padding:24px 28px; border-radius:0 0 2px 2px; }
.cajero-section { margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.cajero-section:last-child { border-bottom:none; margin-bottom:0; }
.cajero-section-title { font-size:8px; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; font-weight:700; }

.caja-asignada-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.caja-usd { position:relative; }
.caja-usd::before { content:'$ USD'; position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:8px; color:#4a7c59; pointer-events:none; }

.adicional-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
.nota-inline { flex:1; }

/* cierre efectivo */
.cierre-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.cierre-total {
  background:var(--ink); padding:12px 16px; border-radius:2px;
  display:flex; justify-content:space-between; align-items:center; margin-top:12px;
}
.cierre-total-label { font-size:9px; color:#555; letter-spacing:.1em; text-transform:uppercase; }
.cierre-total-val { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--gold); }

/* ── PROVEEDOR CARD ── */
.prov-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:24px; }
.prov-card { background:#fff; border:1px solid var(--border); border-radius:2px; overflow:hidden; }
.prov-card-head { background:var(--ink); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
.prov-card-name { font-family:'Shippori Mincho',serif; font-size:15px; color:#f0ece4; font-weight:600; }
.prov-card-body { padding:14px 16px; }
.prov-stat { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border); font-size:10px; }
.prov-stat:last-child { border-bottom:none; }
.prov-deuda { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--red); }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--paper); border-radius:3px; padding:28px; width:100%; max-width:560px; border:1px solid var(--border); max-height:90vh; overflow-y:auto; }
.modal-title { font-family:'Shippori Mincho',serif; font-size:18px; font-weight:700; margin-bottom:20px; }
.modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; right:24px; background:var(--ink);
  color:var(--gold); padding:12px 20px; border-radius:2px;
  font-size:10px; letter-spacing:.05em; z-index:9999;
  transform:translateY(80px); opacity:0; transition:all .3s;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.error { color:var(--red); }
.toast.success { color:#7ec8a0; }

/* ── EMPTY STATE ── */
.empty { padding:48px; text-align:center; color:var(--muted); }
.empty-icon { font-size:32px; margin-bottom:12px; }
.empty-title { font-family:'Shippori Mincho',serif; font-size:16px; color:var(--ink); margin-bottom:6px; }
.empty-sub { font-size:9px; letter-spacing:.1em; }

/* ── PENDIENTE CARD ── */
.pendiente-card {
  background:#fff; border:1px solid var(--border); border-radius:2px;
  margin-bottom:12px; overflow:hidden;
}
.pendiente-head {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; cursor:pointer;
}
.pendiente-head:hover { background:var(--panel); }
.pendiente-detalle { padding:0 16px 14px; display:none; }
.pendiente-detalle.open { display:block; }
.pendiente-fila {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--border); font-size:10px;
}
.pendiente-fila:last-child { border-bottom:none; }

@media(max-width:600px) {
  .main { padding:14px 12px; }
  .pago-montos { grid-template-columns:1fr; }
  .caja-asignada-grid { grid-template-columns:1fr; }
  .cierre-grid { grid-template-columns:1fr; }
  .resumen-row { grid-template-columns:1fr 110px; }
  .resumen-row > :last-child { display:none; }
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="logo">里 SATORI</span>
    <span class="logo-sub">Caja</span>
  </div>
  <div class="header-right">
    <span id="sync-badge" class="sync-badge" onclick="syncData()" title="Sincronizar">⟳ Sincronizando...</span>
    <div style="position:relative">
      <div id="modo-badge" onclick="toggleModoMenu()" style="font-size:8px;letter-spacing:.2em;color:#888;text-transform:uppercase;padding:4px 10px;border:1px solid #2a2a2a;border-radius:1px;cursor:pointer;user-select:none;" title="Cambiar modo"></div>
      <div id="modo-menu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#111;border:1px solid #2a2a2a;border-radius:2px;min-width:160px;z-index:500;overflow:hidden;">
        <div onclick="setModo('operacion');toggleModoMenu()" style="padding:9px 14px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:#888;border-bottom:1px solid #1a1a1a;" onmouseover="this.style.background='#1a1a1a';this.style.color='var(--gold)'" onmouseout="this.style.background='transparent';this.style.color='#888'">Operación</div>
        <div onclick="setModo('contador');toggleModoMenu()" style="padding:9px 14px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:#888;border-bottom:1px solid #1a1a1a;" onmouseover="this.style.background='#1a1a1a';this.style.color='var(--gold)'" onmouseout="this.style.background='transparent';this.style.color='#888'">Contador</div>
        <div onclick="setModo('owner');toggleModoMenu()" style="padding:9px 14px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:#888;" onmouseover="this.style.background='#1a1a1a';this.style.color='var(--gold)'" onmouseout="this.style.background='transparent';this.style.color='#888'">Owner</div>
      </div>
    </div>
  </div>
</header>

<div class="nav-tabs" id="nav-tabs"></div>

<div class="main" id="main-views"></div>

<!-- Modal proveedor -->
<div class="modal-overlay" id="modal-prov">
  <div class="modal">
    <div class="modal-title" id="modal-prov-title">Nuevo Proveedor</div>
    <input type="hidden" id="prov-edit-id">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input class="form-input" id="prov-nombre" placeholder="ej: Pescados del Pacífico">
      </div>
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-select" id="prov-categoria">
          <option>Pescados y Mariscos</option>
          <option>Bebidas y Licores</option>
          <option>Verduras y Frutas</option>
          <option>Lácteos y Huevos</option>
          <option>Carnes</option>
          <option>Abarrotes</option>
          <option>Limpieza y Suministros</option>
          <option>Servicios</option>
          <option>Otros</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Moneda preferida</label>
        <select class="form-select" id="prov-moneda">
          <option value="CRC">₡ Colones (CRC)</option>
          <option value="USD">$ Dólares (USD)</option>
          <option value="Ambas">Ambas</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Ciclo de pago</label>
        <select class="form-select" id="prov-ciclo">
          <option>Diario</option>
          <option>Semanal</option>
          <option>Quincenal</option>
          <option>Mensual</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Método de pago</label>
        <select class="form-select" id="prov-metodo">
          <option>Efectivo</option>
          <option>Transferencia</option>
          <option>SINPE</option>
          <option>Ambos</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">IBAN / Cuenta (opcional)</label>
        <input class="form-input" id="prov-iban" placeholder="CR00...">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <input class="form-input" id="prov-notas" placeholder="Contacto, observaciones...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-prov')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProv()">Guardar proveedor</button>
    </div>
  </div>
</div>

<!-- Modal movimiento manual -->
<div class="modal-overlay" id="modal-mov">
  <div class="modal">
    <div class="modal-title">Registrar Movimiento</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input class="form-input" type="date" id="mov-fecha">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="mov-tipo" onchange="updateMovCategorias()">
          <option>Ingreso</option>
          <option>Egreso - Mercadería</option>
          <option>Egreso - Personal</option>
          <option>Egreso - Operativo</option>
          <option>Egreso - Socios</option>
          <option>Traspaso</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-select" id="mov-categoria"></select>
      </div>
      <div class="form-group" id="mov-prov-group" style="display:none">
        <label class="form-label">Proveedor</label>
        <select class="form-select" id="mov-proveedor"></select>
      </div>
      <div class="form-group" id="mov-emp-group" style="display:none">
        <label class="form-label">Empleado</label>
        <select class="form-select" id="mov-empleado"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Monto ₡</label>
        <div class="monto-wrap">
          <span class="monto-prefix">₡</span>
          <input class="form-input" type="number" id="mov-crc" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Monto $</label>
        <div class="monto-wrap usd">
          <span class="monto-prefix">$</span>
          <input class="form-input" type="number" id="mov-usd" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Método</label>
        <select class="form-select" id="mov-metodo">
          <option>Efectivo</option>
          <option>Transferencia</option>
          <option>SINPE</option>
          <option>Bitcoin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Caja / Origen</label>
        <select class="form-select" id="mov-caja">
          <option>Caja Proveedores</option>
          <option>Caja Fuerte</option>
          <option>Registradora</option>
          <option>Banco</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="mov-estado">
          <option>Pagado</option>
          <option>Pendiente</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Referencia / Factura</label>
        <input class="form-input" id="mov-ref" placeholder="Nº factura, nota...">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>

async function apiGet(params) {
  try {
    const qs = new URLSearchParams({ key:SECRET, ...params }).toString();
    const r = await fetch(API_URL + '?' + qs);
    return await r.json();
  } catch(e) { return null; }
}
async function apiPost(params) {
  try {
    const r = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ key:SECRET, ...params })
    });
    return await r.json();
  } catch(e) { return null; }
}

async function syncData() {
  const badge = document.getElementById('sync-badge');
  if (badge) { badge.textContent = '⟳ Sincronizando...'; badge.className = 'sync-badge'; }

  // ── Google Sheets es la ÚNICA fuente de verdad ─────────────
  // localStorage es solo caché offline. Siempre se intenta Sheets primero.
  // Solo si Sheets falla (sin internet) se usa el caché local.
  // ──────────────────────────────────────────────────────────

  let sheetsOk = false;
  let rProv, rMovs, rTurnos, rCats, rCierres;

  try {
    [rProv, rMovs, rTurnos, rCats, rCierres] = await Promise.all([
      apiGet({ action:'getProvCaja' }),
      apiGet({ action:'getMovimientos' }),
      apiGet({ action:'getTurnos' }),
      apiGet({ action:'getCatsCaja' }),
      apiGet({ action:'getCierresTurno' }),
    ]);

    // PROVEEDORES — Sheets manda siempre
    if (rProv?.ok) {
      PROVEEDORES = rProv.proveedores;
      localStorage.setItem('caja_proveedores', JSON.stringify(PROVEEDORES));
    }

    // MOVIMIENTOS — Sheets es fuente de verdad absoluta
    if (rMovs?.ok) {
      // Normalizar fechas (Sheets puede devolver Date objects)
      MOVIMIENTOS = rMovs.movimientos.map(m => ({
        ...m, fecha: normalizarFecha(m.fecha)
      }));
      // Deduplicar por si acaso
      const seen = new Set();
      MOVIMIENTOS = MOVIMIENTOS.filter(m => {
        if (!m.id || seen.has(m.id)) return false;
        seen.add(m.id); return true;
      });
      localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
      sheetsOk = true;
    }

    // TURNOS — Sheets manda siempre
    if (rTurnos?.ok) {
      TURNOS = rTurnos.turnos.map(t => ({ ...t, fecha: normalizarFecha(t.fecha) }));
      localStorage.setItem('caja_turnos', JSON.stringify(TURNOS));
    }

    // CATEGORÍAS — Sheets manda siempre
    if (rCats?.ok) {
      CATS_DATA = rCats.categorias;
      localStorage.setItem('caja_cats', JSON.stringify(CATS_DATA));
    }

    // CIERRES — Sheets manda siempre
    if (rCierres?.ok) {
      CIERRES_TURNO = rCierres.cierres.map(ct => ({ ...ct, fecha: normalizarFecha(ct.fecha) }));
      localStorage.setItem('caja_cierres', JSON.stringify(CIERRES_TURNO));
    }

  } catch(err) {
    // Sin conexión — usar caché local, normalizar fechas
    console.warn('Sin conexión a Sheets — usando caché local:', err);
    if (!sheetsOk) {
      MOVIMIENTOS = JSON.parse(localStorage.getItem('caja_movimientos')||'[]')
        .map(m => ({ ...m, fecha: normalizarFecha(m.fecha) }));
    }
  }

  const now = new Date().toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
  if (rProv?.ok || rMovs?.ok) {
    badge.textContent = '✓ ' + now;
    badge.className = 'sync-badge ok';
  } else {
    badge.textContent = '⚠ Sin conexión';
    badge.className = 'sync-badge err';
  }

  // Re-render vista activa
  const active = document.querySelector('.nav-tab.active');
  if (active) renderView(active.dataset.id);
}

function today() { return new Date().toISOString().slice(0,10); }

function normalizarFecha(f) {
  if (!f) return '';
  const s = String(f).trim();
  // Ya es YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Tiene YYYY-MM-DD incrustado (ej: ISO timestamp)
  const mISO = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (mISO) return mISO[1]+'-'+mISO[2]+'-'+mISO[3];
  // Número serial de Excel/Sheets (ej: 46140 = 2026-04-28)
  // Rango: ~40000 (2009) a ~55000 (2050)
  const num = parseFloat(s);
  if (!isNaN(num) && num > 40000 && num < 55000) {
    // Base Excel: 1899-12-30
    const base = new Date(Date.UTC(1899, 11, 30));
    const d = new Date(base.getTime() + num * 86400000);
    const y = d.getUTCFullYear();
    const mo = String(d.getUTCMonth()+1).padStart(2,'0');
    const dy = String(d.getUTCDate()).padStart(2,'0');
    return y+'-'+mo+'-'+dy;
  }
  // Formato Date.toString() de Sheets: "Thu Apr 30 2026 00:00:00 GMT-0600..."
  try {
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      const y = d.getFullYear();
      const mo = String(d.getMonth()+1).padStart(2,'0');
      const dy = String(d.getDate()).padStart(2,'0');
      return y+'-'+mo+'-'+dy;
    }
  } catch(e) {}
  return s.slice(0,10);
}
function fi(n) { return n!=null ? '₡'+Math.round(n||0).toLocaleString('es-CR') : '—'; }
function fd(n) { return n!=null ? '$'+parseFloat(n||0).toLocaleString('es-CR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'; }
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }

async function saveMov() {

  const metodo  = document.getElementById('mov-metodo')?.value  || 'Efectivo';

  const provNombre = provEl?.options[provEl?.selectedIndex]?.text || '';

  const mov = {
    id: 'm_' + Date.now(),
    fecha:     document.getElementById('mov-fecha')?.value     || today(),
    turno:     '',
    tipo:      tipo,
    categoria: categoria,

    notas:      document.getElementById('mov-notas')?.value || '',
    timestamp:  new Date().toISOString()
  };

  showToast('Guardando en Sheets...', '');

  // Sheets primero — fuente de verdad
  const r = await apiPost({ action:'saveMovimiento', data: JSON.stringify(mov) });

    turnoMensaje   = 'Mediodía';
  } else if (!tieneNoche) {
    turnoCalculado = 'Noche';
    turnoMensaje   = 'Noche';
  } else {
    turnoCalculado = '';
    turnoBloqueado = true;
    turnoMensaje   = '⚠ Ambos turnos ya registrados para este día';
  }

  const apTurnoInput   = document.getElementById('ap-turno');
  const apTurnoDisplay = document.getElementById('ap-turno-display');
  if (apTurnoInput)   apTurnoInput.value = turnoCalculado;
  if (apTurnoDisplay) {
    apTurnoDisplay.textContent = turnoMensaje;
    apTurnoDisplay.style.color = turnoBloqueado ? 'var(--red)' : 'var(--green)';
  }
  const btnConf = el.querySelector('button.btn-green');
  if (btnConf && turnoBloqueado) {
    btnConf.disabled = true;
    btnConf.style.opacity = '0.4';
    btnConf.style.cursor  = 'not-allowed';
    btnConf.title = 'Ambos turnos del día ya fueron registrados';
  }
  // ──────────────────────────────────────────────────────────

  // Mostrar motivo si el monto cambia
  const apCRC = document.getElementById('ap-crc');
  const apUSD = document.getElementById('ap-usd');
  const _sugCRC = sugeridoCRC;
  const _sugUSD = sugeridoUSD;
  const checkDif = () => {
    const crc = +apCRC?.value||0;
    const usd = +apUSD?.value||0;
    const dif = Math.abs(crc - _sugCRC) > 100 || Math.abs(usd - _sugUSD) > 0.1;
    const w = document.getElementById('ap-motivo-wrap');
    if (w) w.style.display = (_sugCRC > 0 && dif) ? 'block' : 'none';
  };
  if (apCRC) apCRC.addEventListener('input', checkDif);
  if (apUSD) apUSD.addEventListener('input', checkDif);
}

async function confirmarApertura(sugeridoCRC, sugeridoUSD) {
  const empleado = document.getElementById('ap-empleado')?.value;
  const turno    = document.getElementById('ap-turno')?.value;
  const fecha    = document.getElementById('ap-fecha')?.value;
  const crc      = +document.getElementById('ap-crc')?.value || 0;
  const usd      = +document.getElementById('ap-usd')?.value || 0;
  const motivo   = document.getElementById('ap-motivo')?.value?.trim();
  const motivoWrap = document.getElementById('ap-motivo-wrap');

  if (!empleado) { showToast('Seleccioná un empleado', 'error'); return; }
  if (!turno)    { showToast('Turno no determinado', 'error'); return; }

  // Bloquear duplicados: no puede haber dos turnos iguales el mismo día
  const duplicado = TURNOS.find(t => t.fecha === fecha && t.turno === turno);
  if (duplicado) {
    showToast('⚠ Ya existe un turno ' + turno + ' del ' + fecha + '. No se puede duplicar.', 'error');
    return;
  }

  // Si hay diferencia y el motivo es obligatorio
  if (motivoWrap && motivoWrap.style.display !== 'none' && !motivo) {
    showToast('El motivo es obligatorio cuando el monto difiere', 'error');
    document.getElementById('ap-motivo')?.focus();
    return;
  }

  // Guardar estado de apertura
  APERTURA_CONFIRMADA = true;
  APERTURA_MONTO_CRC  = crc;
  APERTURA_MONTO_USD  = usd;
  EMPLEADO = empleado;
  localStorage.setItem('caja_empleado',       empleado);
  localStorage.setItem('caja_apertura_crc',   String(crc));
  localStorage.setItem('caja_apertura_usd',   String(usd));
  localStorage.setItem('caja_apertura_activa','1');

  // Si hay diferencia → registrar como ajuste
  const difCRC = crc - sugeridoCRC;
  const difUSD = usd - sugeridoUSD;
  if (motivo && (Math.abs(difCRC) > 100 || Math.abs(difUSD) > 0.01)) {
    const ajuste = {
      id: 'ap_' + Date.now(), fecha, turno,
      tipo: 'Ajuste', categoria: 'Ajuste',
      subcategoria: 'Diferencia apertura',
      empleado_nombre: empleado,
      monto_crc: difCRC, monto_usd: difUSD,
      metodo: 'Efectivo', caja_origen: 'Caja Fuerte',
      estado: 'Pagado', referencia: '',
      notas: 'Apertura · Diferencia vs cierre anterior · ' + motivo,
      timestamp: new Date().toISOString()
    };
    MOVIMIENTOS.unshift(ajuste);
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    apiPost({ action:'saveMovimiento', data: JSON.stringify(ajuste) });
  }

  // Pre-configurar el turno en Caja Diaria
  document.getElementById('t-empleado') && (document.getElementById('t-empleado').value = empleado);

  showToast('✓ Apertura confirmada — '+ fi(crc), 'success');
  renderView('turno');
}

function recalcCierre2() {
  // Función auxiliar para el bloque de cierre en Caja Diaria
  const cajaCRC  = +document.getElementById('t-caja-crc')?.value || 0;
  const adics    = adicionalesActuales.filter(a=>a).reduce((s,a)=>s+(a.crc||0), 0);
  const ingresos = (typeof ingresosActuales!=='undefined'?ingresosActuales:[]).filter(i=>i).reduce((s,i)=>s+(i.monto_crc||0),0);
  const totalAsig = cajaCRC + adics + ingresos;

  const pagosEf = pagosActuales.filter(p=>p&&p.proveedor_id&&p.metodo==='Efectivo').reduce((s,p)=>s+(p.monto_crc||0),0);
  const deberia = totalAsig - pagosEf;
  const cierreCRC = +document.getElementById('t-cierre-crc')?.value || 0;

  const cvA = document.getElementById('cv-asignado');
  const cvG = document.getElementById('cv-gastado');
  const cvD = document.getElementById('cv-deberia');
  if (cvA) cvA.textContent = fi(totalAsig);
  if (cvG) cvG.textContent = '− ' + fi(pagosEf);
  if (cvD) cvD.textContent = fi(deberia);

  const res = document.getElementById('cierre-resultado');
  const ico = document.getElementById('cierre-icono');
  const msg = document.getElementById('cierre-msg');
  if (!res || !msg) return;

  if (!cierreCRC) {
    res.style.background = '#E6F1FB'; res.style.borderColor = '#85B7EB';
    if (ico) { ico.className='ti ti-info-circle'; ico.style.color='#0C447C'; }
    if (msg) { msg.textContent='Ingresá el efectivo al cierre'; msg.style.color='#0C447C'; }
    return;
  }
  const dif = cierreCRC - deberia;
  const cuadra = Math.abs(dif) < 500;
  res.style.background = cuadra ? '#EAF3DE' : '#FCEBEB';
  res.style.borderColor = cuadra ? '#97C459' : '#F09595';
  if (ico) { ico.className = cuadra ? 'ti ti-circle-check' : 'ti ti-alert-circle'; ico.style.color = cuadra ? '#27500A' : '#A32D2D'; }
  if (msg) { msg.textContent = cuadra ? 'Cuadra correctamente' : 'Diferencia: ' + fi(Math.abs(dif)) + (dif > 0 ? ' de más' : ' faltante'); msg.style.color = cuadra ? '#27500A' : '#A32D2D'; }
}

function recalcTotales() {
  const cajaCRC = +document.getElementById('t-caja-crc')?.value || 0;
  const cajaUSD = +document.getElementById('t-caja-usd')?.value || 0;

  // Sumar adicionales
  const adics = adicionalesActuales.filter(a => a);
  const adicCRC = adics.reduce((s,a) => s + (a.crc||0), 0);
  const adicUSD = adics.reduce((s,a) => s + (a.usd||0), 0);

  const totalCRC = cajaCRC + adicCRC;
  const totalUSD = cajaUSD + adicUSD;

  // Total ingresos adicionales
  const ingresos = (typeof ingresosActuales !== 'undefined' ? ingresosActuales : []).filter(i=>i);
  const ingrCRC = ingresos.reduce((s,i)=>s+(i.monto_crc||0),0);
  const ingrUSD = ingresos.reduce((s,i)=>s+(i.monto_usd||0),0);
  const tiBar = document.getElementById('total-ingresos-bar');
  const tiVal = document.getElementById('total-ingresos-val');
  if (tiBar) tiBar.style.display = ingresos.length ? 'block' : 'none';
  if (tiVal) tiVal.textContent = '₡ ' + Math.round(ingrCRC).toLocaleString('es-CR') + (ingrUSD?' / $'+ingrUSD.toFixed(2):'');

  // Total asignado (caja + adicionales + ingresos)
  const totalCRCconIngr = totalCRC + ingrCRC;
  const totalUSDconIngr = totalUSD + ingrUSD;
  const ta = document.getElementById('total-asignado-crc');
  const taU = document.getElementById('total-asignado-usd');
  if (ta) ta.textContent = '₡ ' + Math.round(totalCRCconIngr).toLocaleString('es-CR');
  if (taU) taU.textContent = totalUSDconIngr ? '$ ' + totalUSDconIngr.toLocaleString('es-CR', {minimumFractionDigits:2}) : '';

  // Pagos en efectivo
  const pagosValidos = pagosActuales.filter(p => p && p.proveedor_id);
  const pagadoEfCRC = pagosValidos.filter(p=>p.metodo==='Efectivo').reduce((s,p)=>s+(p.monto_crc||0),0);
  const pagadoEfUSD = pagosValidos.filter(p=>p.metodo==='Efectivo').reduce((s,p)=>s+(p.monto_usd||0),0);

  // Diferencia esperada
  const difCRC = totalCRC - pagadoEfCRC;
  const difUSD = totalUSD - pagadoEfUSD;

  const difBar = document.getElementById('dif-bar');
  const difCRCel = document.getElementById('dif-crc');
  const difUSDel = document.getElementById('dif-usd');

  if (pagosValidos.length > 0) {
    if (difBar) difBar.style.display = 'flex';
    if (difBar) difBar.style.background = difCRC >= 0 ? '#f0f9f2' : '#fff5f5';
    if (difBar) difBar.style.borderColor = difCRC >= 0 ? '#b0d8b8' : '#f0b0b0';
    if (difCRCel) {
      difCRCel.textContent = '₡ ' + Math.round(Math.abs(difCRC)).toLocaleString('es-CR');
      difCRCel.className = 'cd-total-val ' + (difCRC >= 0 ? 'verde' : 'rojo');
    }
    if (difUSDel) difUSDel.textContent = difUSD ? '$ ' + Math.abs(difUSD).toLocaleString('es-CR', {minimumFractionDigits:2}) : '';
  } else {
    if (difBar) difBar.style.display = 'none';
  }

  // Diferencia en cierre
  const cierreCRC = +document.getElementById('t-cierre-crc')?.value || 0;
  const difCierreEl = document.getElementById('diferencia-cierre');
  const difCierreVal = document.getElementById('dif-cierre-val');
  if (cierreCRC > 0 && difCierreEl && difCierreVal) {
    difCierreEl.style.display = 'block';
    const d = cierreCRC - difCRC;
    difCierreVal.textContent = (d >= 0 ? '+' : '') + '₡ ' + Math.round(d).toLocaleString('es-CR');
    difCierreVal.style.color = Math.abs(d) < 500 ? 'var(--green)' : d > 0 ? '#c8a96e' : 'var(--red)';
    difCierreEl.style.borderColor = Math.abs(d) < 500 ? '#b0d8b8' : d > 0 ? '#e0c878' : '#f0b0b0';
    difCierreEl.style.background = Math.abs(d) < 500 ? '#f0f9f2' : d > 0 ? '#fdf8ec' : '#fff5f5';
  }

  // ── Actualizar cards de estado del nuevo diseño ──────────
  const pagosEfCRC2 = pagosActuales.filter(p=>p&&p.proveedor_id&&p.metodo==='Efectivo').reduce((s,p)=>s+(p.monto_crc||0),0);
  const dispCRC = totalCRCconIngr - pagosEfCRC2;
  const gastEl = document.getElementById('cd-gastado');
  const dispEl = document.getElementById('cd-disponible');
  const dispSub = document.getElementById('cd-disp-sub');
  if (gastEl) { gastEl.textContent = fi(pagosEfCRC2); gastEl.style.color = pagosEfCRC2>0?'#BA7517':'#aaa'; }
  if (dispEl) { dispEl.textContent = fi(dispCRC); dispEl.style.color = dispCRC<0?'#E24B4A':dispCRC<10000?'#BA7517':'#444'; }
  if (dispSub) dispSub.textContent = dispCRC < 0 ? '⚠ déficit en caja' : 'restante en caja';

  // Actualizar lista de pagos confirmados
  const pagosConf = pagosActuales.filter(p=>p&&p.proveedor_id);
  const pagosLista = document.getElementById('pagos-lista');
  const pagosListaItems = document.getElementById('pagos-lista-items');
  const pagosProvSub = document.getElementById('cd-prov-sub');
  if (pagosLista && pagosListaItems && pagosConf.length > 0) {
    pagosLista.style.display = 'block';
    const pagosTrTotal = pagosConf.filter(p=>p.metodo==='Transferencia').reduce((s,p)=>s+(p.monto_crc||0),0);
    pagosListaItems.innerHTML = pagosConf.map(p => {
      const prov = PROVEEDORES.find(pv=>pv.id===p.proveedor_id);
      return `<div style="display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:9px 0;border-bottom:0.5px solid #f0f0f0">
        <div>
          <div style="font-size:13px;font-weight:500">${esc(p.proveedor_nombre||prov?.nombre||'—')}</div>
          <div style="font-size:11px;color:#aaa;margin-top:2px">${esc(prov?.categoria||'Proveedor')}${p.referencia?' · ref: '+esc(p.referencia):''}</div>
        </div>
        <span style="background:${p.metodo==='Efectivo'?'#EAF3DE':'#FAEEDA'};color:${p.metodo==='Efectivo'?'#27500A':'#633806'};font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap">${p.metodo}</span>
        <div style="font-size:13px;font-weight:500;text-align:right;white-space:nowrap;color:${p.metodo==='Transferencia'?'#888':'inherit'}">${fi(p.monto_crc)}</div>
        <i class="ti ti-${p.metodo==='Efectivo'?'check':'clock'}" style="color:${p.metodo==='Efectivo'?'#639922':'#BA7517'};font-size:16px"></i>
      </div>`;
    }).join('');
    const totEfEl = document.getElementById('cd-tot-ef');
    if (totEfEl) totEfEl.textContent = fi(pagosEfCRC2);
    const pendBar = document.getElementById('cd-pend-bar');
    const pendTxt = document.getElementById('cd-pend-txt');
    if (pendBar && pendTxt) {
      if (pagosTrTotal > 0) {
        pendBar.style.display = 'flex';
        pendTxt.innerHTML = `<strong>${fi(pagosTrTotal)}</strong> por transferencia — pendiente de confirmación por contador`;
      } else pendBar.style.display = 'none';
    }
  } else if (pagosLista) pagosLista.style.display = 'none';
  if (pagosProvSub) {
    const ef = pagosConf.filter(p=>p.metodo==='Efectivo').length;
    const tr = pagosConf.filter(p=>p.metodo==='Transferencia').length;
    pagosProvSub.textContent = pagosConf.length===0 ? 'Sin pagos registrados'
      : `${pagosConf.length} registrado${pagosConf.length!==1?'s':''} · ${ef} efectivo · ${tr} transferencia`;
  }
  // Actualizar verificación del cierre
  recalcCierre2();
}

function setMetodo(idx, metodo) {
  pagosActuales[idx].metodo = metodo;

  // UI tabs
  const tabs = document.querySelectorAll(`#metodo-tabs-${idx} .metodo-tab`);
  tabs.forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`#metodo-tabs-${idx} .metodo-tab.${metodo.toLowerCase()}`);
  if (activeTab) activeTab.classList.add('active');

  // Info y badge
  const info = document.getElementById(`pago-metodo-info-${idx}`);
  const badge = document.getElementById(`pago-badge-pendiente-${idx}`);

  if (metodo === 'Efectivo') {
    if (info) { info.style.display = 'block'; info.style.color = '#7ec8a0'; info.textContent = '✓ Efectivo — se descuenta del total asignado'; }
    if (badge) badge.style.display = 'none';
    pagosActuales[idx].estado = 'Pagado';
  } else {
    if (info) { info.style.display = 'block'; info.style.color = '#7ab4d4'; info.textContent = '→ Transferencia — queda registrado como pendiente hasta confirmar el pago'; }
    if (badge) badge.style.display = 'inline';
    pagosActuales[idx].estado = 'Pendiente';
  }

  recalcTotales();
}

async function confirmarCierreTurno() {
  document.getElementById('modal-resumen-turno')?.remove();

  const empleado  = document.getElementById('t-empleado')?.value;
  const turno     = document.getElementById('t-turno')?.value;
  const fecha     = document.getElementById('t-fecha')?.value;
  const cajaCRC   = +document.getElementById('t-caja-crc')?.value || 0;
  const cajaUSD   = +document.getElementById('t-caja-usd')?.value || 0;
  const cierreCRC = +document.getElementById('t-cierre-crc')?.value || 0;
  const cierreUSD = +document.getElementById('t-cierre-usd')?.value || 0;
  const notas     = document.getElementById('t-notas')?.value || '';

  const pagosValidos = pagosActuales.filter(p => p && p.proveedor_id);
  const adicsValidos = adicionalesActuales.filter(a => a && (a.crc||a.usd));

  const data = {
    id: Date.now().toString(),
    fecha, turno, empleado,
    caja_asignada_crc: cajaCRC, caja_asignada_usd: cajaUSD,
    adicionales: adicsValidos,
    pagos: pagosValidos,
    efectivo_cierre_crc: cierreCRC, efectivo_cierre_usd: cierreUSD,
    notas, timestamp: new Date().toISOString()
  };

  // Guardar local
  TURNOS.push(data);
  localStorage.setItem('caja_turnos', JSON.stringify(TURNOS));

  // Registrar movimientos en local
  pagosValidos.forEach(p => {
    MOVIMIENTOS.push({
      id: data.id + '_' + Date.now() + '_' + Math.random(),
      fecha, turno, tipo: 'Egreso',
      categoria: 'Egreso - Mercadería', subcategoria: 'Proveedor mercadería',
      proveedor_id: p.proveedor_id, proveedor_nombre: p.proveedor_nombre,
      empleado_nombre: empleado,
      monto_crc: p.monto_crc, monto_usd: p.monto_usd,
      metodo: p.metodo, caja_origen: 'Caja Proveedores',
      // CRÍTICO: Transferencia siempre Pendiente hasta que contador confirme
      estado: p.metodo === 'Transferencia' ? 'Pendiente' : 'Pagado',
      referencia: p.nota||'', notas: p.nota||'', timestamp: new Date().toISOString()
    });
  });
  localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));

  showToast('Guardando en la nube...', '');
  const r = await apiPost({ action:'saveTurno', data: JSON.stringify(data) });
  if (r?.ok) {
    showToast('✓ Turno cerrado correctamente', 'success');
  } else {
    showToast('⚠ Guardado local · Sin conexión al servidor', 'error');
  }

  // Limpiar y volver a renderizar
  pagosActuales = [];
  adicionalesActuales = [];
  renderView('turno');
}

function renderMovimientos(el) {
  // Default: últimos 60 días (no solo el mes actual)
  const defaultFrom = (() => {
    const d = new Date(); d.setDate(d.getDate() - 60);
    return d.toISOString().slice(0,10);
  })();
  const from = localStorage.getItem('mov_from') || defaultFrom;
  const to   = localStorage.getItem('mov_to')   || today();

function tipoColor(tipo) {
  if (!tipo) return '#888';
  if (tipo === 'Ingreso') return '#7ec8a0';
  if (tipo.startsWith('Egreso')) return '#c23b22';
  if (tipo === 'Traspaso') return '#c8a96e';
  if (tipo === 'Ajuste') return '#e8904a';
  return '#888';
}

function filterAndRenderMovs() {
  const body = document.getElementById('movs-body');
  if (!body) return;
  const from   = document.getElementById('mov-from')?.value   || '';
  const to     = document.getElementById('mov-to')?.value     || '';
  const tipo   = document.getElementById('mov-filtro-tipo')?.value  || '';
  const busq   = (document.getElementById('mov-filtro-busq')?.value || '').toLowerCase();
  const estado = document.getElementById('mov-filtro-estado')?.value || '';

  let movs = MOVIMIENTOS.filter(m => {
    if (from && m.fecha < from) return false;
    if (to   && m.fecha > to)   return false;
    if (tipo && m.categoria !== tipo) return false;
    if (estado && m.estado !== estado) return false;
    if (busq && !(
      (m.proveedor_nombre||'').toLowerCase().includes(busq) ||
      (m.empleado_nombre||'').toLowerCase().includes(busq) ||
      (m.notas||'').toLowerCase().includes(busq) ||
      (m.referencia||'').toLowerCase().includes(busq)
    )) return false;

  };
  // Agregar a memoria y localStorage para edición inmediata en tabla
  MOVIMIENTOS.unshift(newMov);

  filterAndRenderMovs();
  setTimeout(() => {

async function updateMovField(id, field, value) {
  const idx = MOVIMIENTOS.findIndex(m => m.id === id);
  if (idx < 0) return;

  // Guardar valor anterior por si hay que revertir
  const valorAnterior = MOVIMIENTOS[idx][field];
  MOVIMIENTOS[idx][field] = value;

  // Recalcular estado si cambió el método de pago
  const estadoAnterior = MOVIMIENTOS[idx].estado;
  if (field === 'metodo') {
    MOVIMIENTOS[idx].estado = (value === 'Transferencia') ? 'Pendiente' : 'Pagado';
  }

  // Sheets primero — fuente de verdad
  const r = await apiPost({ action:'saveMovimiento', data: JSON.stringify(MOVIMIENTOS[idx]) });

  if (r?.ok) {
    // Sheets confirmó → guardar en local
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    buildSaldos();
  } else {
    // Sheets falló → revertir el cambio en local y en memoria
    MOVIMIENTOS[idx][field] = valorAnterior;
    if (field === 'metodo') MOVIMIENTOS[idx].estado = estadoAnterior;
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    showToast('✗ Error al guardar en Sheets. El cambio fue revertido.','error');
    // Re-renderizar para mostrar el valor revertido
    filterAndRenderMovs();
  }
}

function updateMovPE(id, value) {
  const idx = MOVIMIENTOS.findIndex(m => m.id === id);
  if (idx < 0) return;
  MOVIMIENTOS[idx].proveedor_nombre = value;
  MOVIMIENTOS[idx].empleado_nombre  = value;
  // Guardar en Sheets y actualizar local
  apiPost({ action:'saveMovimiento', data: JSON.stringify(MOVIMIENTOS[idx]) });
  localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
}

async function updateMovEstadoLocal(id, estado) {
  const idx = MOVIMIENTOS.findIndex(m => m.id === id);
  if (idx < 0) return;
  MOVIMIENTOS[idx].estado = estado;
  localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
  // Actualizar color de fila
  const row = document.getElementById('mov-row-' + id);
  if (row) row.style.background = estado === 'Pendiente' ? '#fffdf5' : '';
  await apiPost({ action:'updateMovEstado', id, estado });
}

async function deleteMovLocal(id) {
  if (!confirm('¿Eliminar este movimiento? Esta acción no se puede deshacer.')) return;
  showToast('Eliminando en Sheets...', '');

  // Sheets primero — confirmar eliminación en el servidor antes de tocar local
  const r = await apiPost({ action:'deleteMovimiento', id });

  if (r?.ok) {
    // Sheets confirmó → eliminar del local
    const idx = MOVIMIENTOS.findIndex(m => m.id === id);
    if (idx >= 0) MOVIMIENTOS.splice(idx, 1);
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    showToast('✓ Movimiento eliminado','success');
    filterAndRenderMovs();
    buildSaldos();
  } else {
    // Sheets falló → NO tocar local, mostrar error
    showToast('✗ Error al eliminar en Sheets. El movimiento no fue eliminado.','error');
  }
}

function buildSaldos() {
  const bar = document.getElementById('saldos-bar');
  if (!bar) return;

  // ── CAJA FUERTE (lógica correcta) ────────────────────────
  // Solo cuentan movimientos reales de efectivo:
  // + Ingresos de Caja Fuerte (ventas de cierres de turno)
  // - Egresos de Caja Fuerte (propinas, otros egresos del cierre)
  // - Pagos de Caja Diaria EN EFECTIVO (no transferencias)
  // + Ajustes manuales

  let cfCRC = 0, cfUSD = 0;

  MOVIMIENTOS.forEach(m => {
    const cat = m.categoria || '';
    const metodo = m.metodo || '';
    const caja = m.caja_origen || '';
    const tipo = m.tipo || '';

    // Ventas efectivo del cierre de turno (manager) → entra a CF
    if (tipo === 'Ingreso' && caja === 'Caja Fuerte') {
      cfCRC += m.monto_crc||0;
      cfUSD += m.monto_usd||0;
    }
    // Egresos EFECTIVOS de Caja Fuerte (propinas, otros del cierre)
    else if (tipo === 'Egreso' && caja === 'Caja Fuerte') {
      cfCRC -= m.monto_crc||0;
      cfUSD -= m.monto_usd||0;
    }
    // Pagos a proveedores EN EFECTIVO desde Caja Diaria → salen de CF
    else if (tipo === 'Egreso' && cat === 'Egreso - Mercadería' &&
             metodo === 'Efectivo' && m.estado === 'Pagado') {
      cfCRC -= m.monto_crc||0;
      cfUSD -= m.monto_usd||0;
    }
    // Ajustes → suman o restan según el signo del monto
    else if (cat === 'Ajuste') {
      cfCRC += m.monto_crc||0; // puede ser negativo
    }
    // Traspasos internos (CF→Diaria, Diaria→CF) NO afectan el total
  });

  // ── PENDIENTES DE TRANSFERENCIA ───────────────────────────
  let pendCRC = 0, pendUSD = 0, pendCount = 0;
  const provsPend = new Set();
  MOVIMIENTOS.forEach(m => {
    if (m.metodo === 'Transferencia' && m.estado === 'Pendiente') {
      pendCRC += m.monto_crc||0;
      pendUSD += m.monto_usd||0;
      pendCount++;
      if (m.proveedor_nombre) provsPend.add(m.proveedor_nombre);
    }
  });

  // ── AJUSTES DEL MES ───────────────────────────────────────
  const mesActual = new Date().toISOString().slice(0,7);
  let ajustesCRC = 0, ajustesCount = 0;
  MOVIMIENTOS.forEach(m => {
    if (m.categoria === 'Ajuste' && (m.fecha||'').slice(0,7) === mesActual) {
      ajustesCRC += m.monto_crc||0;
      ajustesCount++;
    }
  });

  // ── RENDER HERO CF ────────────────────────────────────────
  const hero = document.getElementById('cf-hero');
  if (hero) {
    const negCRC = cfCRC < 0;
    const colorCRC = negCRC ? 'var(--red)' : 'var(--gold)';
    hero.innerHTML = `
      <div style="background:var(--ink);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:2px;padding:16px 22px;display:flex;align-items:center;gap:32px;flex-wrap:wrap">
        <div>
          <div style="font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#555;margin-bottom:6px">Saldo Caja Fuerte</div>
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${colorCRC};line-height:1">${fi(cfCRC)}</div>
          ${cfUSD ? `<div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#7ab4d4;margin-top:6px">${fd(cfUSD)}</div>` : ''}
        </div>
        <div style="font-size:9px;color:#555;line-height:1.7;border-left:1px solid #2a2a2a;padding-left:24px">
          <div>Saldo inicial registrado: <span style="color:#888">${fi(CF_SALDO_INICIAL)}${CF_SALDO_INICIAL_USD ? ' / ' + fd(CF_SALDO_INICIAL_USD) : ''}</span></div>
          <div>Este es el efectivo que debería haber físicamente en CF</div>
        </div>
      </div>`;
  }

  // ── RENDER SALDOS SECUNDARIOS ─────────────────────────────
  bar.innerHTML = `
    <div class="saldo-card" style="border-left-color:var(--gold);opacity:.6">
      <div class="saldo-label">Caja Fuerte</div>
      <div class="saldo-val ${cfCRC < 0 ? 'red' : ''}">${fi(cfCRC)}</div>
      ${cfUSD ? `<div class="saldo-val usd">${fd(cfUSD)}</div>` : ''}
    </div>
    <div class="saldo-card" style="border-left-color:${pendCRC>0?'#c8a030':'#444'}">
      <div class="saldo-label">Pend. Transferencia</div>
      <div class="saldo-val" style="color:${pendCRC>0?'#c8a030':'#555'};font-size:${pendCRC>0?'17px':'13px'}">${pendCRC>0?fi(pendCRC):'Sin pendientes'}</div>
      ${pendCRC>0?`<div style="font-size:9px;color:#888;margin-top:3px">${provsPend.size} proveedor${provsPend.size!==1?'es':''} · ${pendCount} pago${pendCount!==1?'s':''}</div>`:''}
    </div>
    <div class="saldo-card" style="border-left-color:${ajustesCRC<0?'var(--red)':ajustesCRC>0?'#7ec8a0':'#444'}">
      <div class="saldo-label">Ajustes del mes</div>
      <div class="saldo-val" style="color:${ajustesCRC<0?'var(--red)':ajustesCRC>0?'#7ec8a0':'#555'};font-size:${ajustesCount>0?'17px':'13px'}">
        ${ajustesCount>0?(ajustesCRC>=0?'+':'')+fi(ajustesCRC):'Sin ajustes'}
      </div>
      ${ajustesCount>0?`<div style="font-size:9px;color:#888;margin-top:3px">${ajustesCount} registro${ajustesCount!==1?'s':''}</div>`:''}
    </div>
  `;
}


function exportMovCSV() {
  const from = document.getElementById('mov-from')?.value || '';
  const to   = document.getElementById('mov-to')?.value   || '';
  const movs = MOVIMIENTOS.filter(m => (!from||m.fecha>=from) && (!to||m.fecha<=to));
  const BOM = '\uFEFF';
  const hdrs = ['Fecha','Turno','Tipo','Subcategoría','Prov./Empleado','₡','$','Método','Caja','Estado','Notas'];
  const rows = movs.map(m => [
    m.fecha, m.turno||'', m.categoria, m.subcategoria||'',
    m.proveedor_nombre||m.empleado_nombre||'',
    m.monto_crc||0, m.monto_usd||0, m.metodo||'',
    m.caja_origen||'', m.estado||'', m.notas||m.referencia||''
  ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = BOM + [hdrs.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `satori_movimientos_${from}_${to}.csv`;
  a.click();
}

function openProvModal(id) {
  document.getElementById('modal-prov-title').textContent = id ? 'Editar Proveedor' : 'Nuevo Proveedor';
  document.getElementById('prov-edit-id').value = id || '';
  if (id) {
    const p = PROVEEDORES.find(x=>x.id===id);
    if (p) {
      document.getElementById('prov-nombre').value    = p.nombre;
      document.getElementById('prov-categoria').value = p.categoria;
      document.getElementById('prov-moneda').value    = p.moneda;
      document.getElementById('prov-ciclo').value     = p.ciclo_pago;
      document.getElementById('prov-metodo').value    = p.metodo_pago;
      document.getElementById('prov-iban').value      = p.cuenta_iban||'';
      document.getElementById('prov-notas').value     = p.notas||'';
    }
  } else {
    ['prov-nombre','prov-iban','prov-notas'].forEach(id=>document.getElementById(id).value='');
  }
  openModal('modal-prov');
}

async function saveProv() {
  const editId = document.getElementById('prov-edit-id').value;
  const data = {
    id:         editId || Date.now().toString(),
    nombre:     document.getElementById('prov-nombre').value.trim(),
    categoria:  document.getElementById('prov-categoria').value,
    moneda:     document.getElementById('prov-moneda').value,
    ciclo_pago: document.getElementById('prov-ciclo').value,
    metodo_pago:document.getElementById('prov-metodo').value,
    cuenta_iban:document.getElementById('prov-iban').value.trim(),
    notas:      document.getElementById('prov-notas').value.trim(),
    activo:     true
  };
  if (!data.nombre) { showToast('El nombre es obligatorio','error'); return; }

  if (editId) {
    const idx = PROVEEDORES.findIndex(p=>p.id===editId);
    if (idx>=0) PROVEEDORES[idx]=data; else PROVEEDORES.push(data);
  } else {
    PROVEEDORES.push(data);
  }
  localStorage.setItem('caja_proveedores', JSON.stringify(PROVEEDORES));
  closeModal('modal-prov');
  showToast('Guardando...','');
  const r = await apiPost({ action:'saveProvCaja', data:JSON.stringify(data) });
  showToast(r?.ok?'✓ Proveedor guardado':'⚠ Guardado local', r?.ok?'success':'error');
  renderView('proveedores');
}

async function deleteProv(id) {
  if (!confirm('¿Desactivar este proveedor?')) return;
  const idx = PROVEEDORES.findIndex(p=>p.id===id);
  if (idx>=0) PROVEEDORES[idx].activo = false;
  localStorage.setItem('caja_proveedores', JSON.stringify(PROVEEDORES));
  await apiPost({ action:'deleteProvCaja', id });
  renderView('proveedores');
}

function togglePendiente(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

async function marcarPagado(movId) {
  if (!confirm('¿Confirmar pago por transferencia?')) return;
  showToast('Confirmando en Sheets...', '');

  // Sheets primero — NUNCA actualizar local si Sheets falla
  const r = await apiPost({ action:'updateMovEstado', id:movId, estado:'Pagado' });

  if (r?.ok) {
    // Sheets confirmó → actualizar local con la confirmación del servidor
    const idx = MOVIMIENTOS.findIndex(m=>m.id===movId);
    if (idx>=0) MOVIMIENTOS[idx].estado = 'Pagado';
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    showToast('✓ Pago confirmado y guardado en Sheets','success');
    renderView('pendientes');
    buildSaldos();
  } else {
    // Sheets falló → NO tocar el local, mostrar error claro
    showToast('✗ Error: no se pudo confirmar en Sheets. Reintentá.','error');
    // NO actualizamos nada local — el pago sigue Pendiente en ambos lados
  }
}

async function marcarTodosPagado(nombreProv) {
  if (!confirm('¿Confirmar TODOS los pagos pendientes de ' + nombreProv + '?')) return;
  showToast('Confirmando en Sheets...', '');

  const movsPend = MOVIMIENTOS.filter(m =>
    (m.proveedor_nombre===nombreProv || m.subcategoria===nombreProv) &&
    m.metodo==='Transferencia' && m.estado==='Pendiente'
  );

  let confirmados = 0, fallidos = 0;
  for (const m of movsPend) {
    const r = await apiPost({ action:'updateMovEstado', id:m.id, estado:'Pagado' });
    if (r?.ok) {
      // Solo actualizar local si Sheets confirmó
      const idx = MOVIMIENTOS.findIndex(x=>x.id===m.id);
      if (idx>=0) MOVIMIENTOS[idx].estado = 'Pagado';
      confirmados++;
    } else {
      fallidos++;
    }
  }

  if (fallidos === 0) {
    // Todos confirmados en Sheets → guardar local
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    showToast('✓ ' + confirmados + ' pago(s) confirmados en Sheets','success');
    renderView('pendientes');
    buildSaldos();
  } else if (confirmados > 0) {
    // Algunos fallaron → guardar los que sí
    localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));
    showToast('⚠ ' + confirmados + ' confirmados, ' + fallidos + ' fallaron. Reintentá los que faltan.','error');
    renderView('pendientes');
    buildSaldos();
  } else {
    // Todos fallaron → NO tocar local
    showToast('✗ Error de conexión — ningún pago confirmado. Reintentá.','error');
  }
}

function descargarImagenProveedor(nombre, movs) {
  // Crear canvas con el detalle para el proveedor
  const canvas = document.createElement('canvas');
  const W = 600, ROW_H = 38, HEADER = 180, FOOTER = 80;
  const H = HEADER + (movs.length * ROW_H) + FOOTER + 20;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Fondo
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // Banda dorada superior
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(0, 0, W, 4);

  // Logo / título
  ctx.fillStyle = '#c8a96e';
  ctx.font = 'bold 28px serif';
  ctx.fillText('里 SATORI', 30, 50);

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('DETALLE DE PAGO A PROVEEDOR', 30, 70);

  // Nombre proveedor
  ctx.fillStyle = '#f0ece4';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(nombre, 30, 105);

  // Fecha generación
  ctx.fillStyle = '#666';
  ctx.font = '11px monospace';
  ctx.fillText('Generado: ' + new Date().toLocaleDateString('es-CR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}), 30, 130);

  // Línea separadora
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, 148); ctx.lineTo(W-30, 148); ctx.stroke();

  // Cabecera tabla
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 152, W, 24);
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('FECHA', 30, 168);
  ctx.fillText('TURNO', 110, 168);
  ctx.fillText('MONTO ₡', 200, 168);
  ctx.fillText('MONTO $', 330, 168);
  ctx.fillText('REFERENCIA', 420, 168);

  // Filas
  movs.forEach((m, i) => {
    const y = HEADER + (i * ROW_H) + 24;
    ctx.fillStyle = i % 2 === 0 ? '#0a0a0a' : '#111';
    ctx.fillRect(0, y - 18, W, ROW_H);

    ctx.fillStyle = '#f0ece4';
    ctx.font = '12px monospace';
    ctx.fillText(m.fecha || '—', 30, y);
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText(m.turno || '—', 110, y);
    ctx.fillStyle = '#c8a96e';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(m.monto_crc ? '₡'+Math.round(m.monto_crc).toLocaleString('es-CR') : '—', 200, y);
    ctx.fillStyle = '#7ab4d4';
    ctx.fillText(m.monto_usd ? '$'+parseFloat(m.monto_usd).toFixed(2) : '—', 330, y);
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    const nota = (m.notas||m.referencia||'—').slice(0,20);
    ctx.fillText(nota, 420, y);
  });

  // Total
  const totCRC = movs.reduce((s,m)=>s+(m.monto_crc||0),0);
  const totUSD = movs.reduce((s,m)=>s+(m.monto_usd||0),0);
  const yTot = HEADER + (movs.length * ROW_H) + 20;

  ctx.strokeStyle = '#c8a96e';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, yTot - 8); ctx.lineTo(W-30, yTot - 8); ctx.stroke();

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('TOTAL PENDIENTE', 30, yTot + 14);

  ctx.fillStyle = '#c8a96e';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('₡ ' + Math.round(totCRC).toLocaleString('es-CR'), 200, yTot + 14);
  if (totUSD > 0) {
    ctx.fillStyle = '#7ab4d4';
    ctx.fillText('$ ' + totUSD.toFixed(2), 330, yTot + 14);
  }

  // Pie
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, yTot + 28); ctx.lineTo(W-30, yTot + 28); ctx.stroke();
  ctx.fillStyle = '#444';
  ctx.font = '9px monospace';
  ctx.fillText('SATORI RESTAURANTE · Documento de pago pendiente por transferencia bancaria', 30, yTot + 44);

  // Banda dorada inferior
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(0, H-4, W, 4);

  // Descargar
  const link = document.createElement('a');
  link.download = 'pago-' + nombre.replace(/\s+/g,'-').toLowerCase() + '-' + new Date().toISOString().slice(0,10) + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('✓ Imagen descargada','success');
}

function exportPendientesCSV() {
  const pend = MOVIMIENTOS.filter(m=>m.metodo==='Transferencia'&&m.estado==='Pendiente');
  const BOM = '\uFEFF';
  const hdrs = ['Proveedor','Fecha','Turno','₡','$','Referencia','Notas'];
  const rows = pend.map(m=>[
    m.proveedor_nombre||m.subcategoria||'',m.fecha,m.turno||'',
    m.monto_crc||0,m.monto_usd||0,m.referencia||'',m.notas||''
  ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = BOM + [hdrs.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'pendientes-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

        <input class="form-input" type="month" id="res-mes" value="${selFecha}" style="padding:5px 8px;font-size:10px" onchange="localStorage.setItem('resumen_fecha',this.value);renderResumen(document.getElementById('view-resumen'))">
        <button class="btn btn-ghost btn-sm" onclick="exportResumen()">⬇ Excel</button>
      </div>
    </div>
    <div id="resumen-body"></div>
  `;

  buildResumenBody();
}

function buildResumenBody() {
  const el = document.getElementById('resumen-body');
  if (!el) return;
  const mesStr = document.getElementById('res-mes')?.value || today().slice(0,7);
  const [year, month] = mesStr.split('-').map(Number);

  // Calcular rango del período
  const from = `${year}-${String(month).padStart(2,'0')}-01`;
  const to   = new Date(year, month, 0).toISOString().slice(0,10);

  const movs = MOVIMIENTOS.filter(m => m.fecha >= from && m.fecha <= to);
  const turnos = TURNOS.filter(t => t.fecha >= from && t.fecha <= to);

  // Calcular totales por categoría
  function totCat(tipo, cat) {
    // Busca por subcategoria o categoria
    const filtered = movs.filter(m =>
      (m.tipo===tipo || m.categoria===tipo || m.categoria?.startsWith(tipo)) &&
      (m.subcategoria===cat || m.categoria===cat)
    );
    return {
      crc: filtered.reduce((s,m)=>s+(m.monto_crc||0),0),
      usd: filtered.reduce((s,m)=>s+(m.monto_usd||0),0),
    };
  }
  function totTipo(tipo) {
    return {
      crc: movs.filter(m=>m.tipo===tipo).reduce((s,m)=>s+(m.monto_crc||0),0),
      usd: movs.filter(m=>m.tipo===tipo).reduce((s,m)=>s+(m.monto_usd||0),0),
    };
  }

  // Efectivo al cierre desde turnos (última lectura del período)
  const cierresMedianoche = turnos.filter(t=>t.turno==='Mediodía');
  const cierresNoche      = turnos.filter(t=>t.turno==='Noche');
  const ultCierreCRC = turnos.length ? turnos[turnos.length-1].efectivo_cierre_crc||0 : 0;
  const ultCierreUSD = turnos.length ? turnos[turnos.length-1].efectivo_cierre_usd||0 : 0;

  const totalIngresos = totTipo('Ingreso');
  const totalEgresos  = totTipo('Egreso');
  const resultadoCRC  = totalIngresos.crc - totalEgresos.crc;
  const resultadoUSD  = totalIngresos.usd - totalEgresos.usd;

  // Agrupar egresos por proveedor
  const egresosProvMap = {};
  movs.filter(m=>m.tipo==='Egreso'&&m.categoria==='Egreso - Mercadería').forEach(m=>{
    const k = m.proveedor_nombre||'Sin proveedor';
    if (!egresosProvMap[k]) egresosProvMap[k]={crc:0,usd:0};
    egresosProvMap[k].crc += m.monto_crc||0;
    egresosProvMap[k].usd += m.monto_usd||0;
  });

  function row(label, crc, usd, indent=0, neg=false) {
    const crcStr = crc ? `<span style="color:${neg&&crc>0?'var(--red)':crc>0?'inherit':'#444'}">${fi(crc)}</span>` : '<span style="color:#333">—</span>';
    const usdStr = usd ? `<span style="color:#7ab4d4">${fd(usd)}</span>` : '';
    return `<div class="resumen-row" style="${indent?'padding-left:'+((indent)*20+14)+'px':''}">
      <span style="${indent===2?'color:#aaa;font-size:10px':indent===1?'color:#888':'font-weight:600'}">${label}</span>
      <span class="resumen-val">${crcStr}</span>
      <span class="resumen-val usd">${usdStr}</span>
    </div>`;
  }

  let html = `
    <div style="display:grid;grid-template-columns:1fr 140px 120px;padding:8px 14px;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#888;border-bottom:1px solid var(--border)">
      <span>Categoría</span><span style="text-align:right">₡ Colones</span><span style="text-align:right">$ Dólares</span>
    </div>

    <div class="resumen-section">
      <div class="resumen-section-hdr">INGRESOS</div>
      ${(CATS_DATA||[]).filter(c=>c.tipo==='Ingreso'&&c.activo!==false).map(cat=>{
        const t=totCat('Ingreso',cat.nombre);
        return (t.crc||t.usd)?row(cat.nombre,t.crc,t.usd,1):'';
      }).join('')}
      <div class="resumen-row total">
        <span>TOTAL INGRESOS</span>
        <span class="resumen-val">${fi(totalIngresos.crc)}</span>
        <span class="resumen-val usd">${totalIngresos.usd?fd(totalIngresos.usd):''}</span>
      </div>
    </div>

    <div class="resumen-section">
      <div class="resumen-section-hdr">EGRESOS · MERCADERÍAS</div>
      ${Object.entries(egresosProvMap).sort((a,b)=>b[1].crc-a[1].crc).map(([n,v])=>row(n,v.crc,v.usd,1,true)).join('')}
      ${row('Subtotal Mercaderías',
        movs.filter(m=>m.tipo==='Egreso'&&m.categoria==='Egreso - Mercadería').reduce((s,m)=>s+(m.monto_crc||0),0),
        movs.filter(m=>m.tipo==='Egreso'&&m.categoria==='Egreso - Mercadería').reduce((s,m)=>s+(m.monto_usd||0),0),0,true)}
    </div>

    <div class="resumen-section">
      <div class="resumen-section-hdr">EGRESOS · PERSONAL</div>
      ${(CATS_DATA||[]).filter(c=>c.tipo==='Egreso - Personal'&&c.activo!==false).map(cat=>{
        const t=totCat('Egreso',cat.nombre)||totCat('Egreso - Personal',cat.nombre);
        return (t.crc||t.usd)?row(cat.nombre,t.crc,t.usd,1,true):'';
      }).join('')}
    </div>

    <div class="resumen-section">
      <div class="resumen-section-hdr">EGRESOS · OPERATIVOS</div>
      ${(CATS_DATA||[]).filter(c=>c.tipo==='Egreso - Operativo'&&c.activo!==false).map(cat=>{
        const t=totCat('Egreso',cat.nombre)||totCat('Egreso - Operativo',cat.nombre);
        return (t.crc||t.usd)?row(cat.nombre,t.crc,t.usd,1,true):'';
      }).join('')}
    </div>

    <div class="resumen-section">
      <div class="resumen-section-hdr">EGRESOS · SOCIOS</div>
      ${(CATS_DATA||[]).filter(c=>c.tipo==='Egreso - Socios'&&c.activo!==false).map(cat=>{
        const t=totCat('Egreso',cat.nombre)||totCat('Egreso - Socios',cat.nombre);
        return (t.crc||t.usd)?row(cat.nombre,t.crc,t.usd,1,true):'';
      }).join('')}
    </div>

    <div class="resumen-section">
      <div class="resumen-row total">
        <span>TOTAL EGRESOS</span>
        <span class="resumen-val neg">${fi(totalEgresos.crc)}</span>
        <span class="resumen-val usd neg">${totalEgresos.usd?fd(totalEgresos.usd):''}</span>
      </div>
      <div class="resumen-row resultado">
        <span>RESULTADO DEL PERÍODO</span>
        <span class="resumen-val ${resultadoCRC>=0?'pos':'neg'}">${fi(resultadoCRC)}</span>
        <span class="resumen-val usd ${resultadoUSD>=0?'pos':'neg'}">${resultadoUSD?fd(resultadoUSD):''}</span>
      </div>
    </div>

    <div class="resumen-section" style="margin-top:20px">
      <div class="resumen-section-hdr">POSICIÓN DE EFECTIVO AL CIERRE</div>
      <div class="resumen-row"><span>Caja Proveedores (último cierre ₡)</span><span class="resumen-val">${fi(ultCierreCRC)}</span><span class="resumen-val usd">${ultCierreUSD?fd(ultCierreUSD):''}</span></div>
      <div class="resumen-row"><span style="font-size:9px;color:#555">Cierres registrados en el período</span><span class="resumen-val" style="font-size:10px;color:#888">${turnos.length}</span><span></span></div>
    </div>
  `;

  el.innerHTML = html;
}

function exportResumen() {
  showToast('Generando Excel...','');
  const mesStr = document.getElementById('res-mes')?.value || today().slice(0,7);
  // Exportar como CSV
  const [year, month] = mesStr.split('-').map(Number);
  const from = `${year}-${String(month).padStart(2,'0')}-01`;
  const to   = new Date(year, month, 0).toISOString().slice(0,10);
  const movs = MOVIMIENTOS.filter(m => m.fecha >= from && m.fecha <= to);

  const BOM = '\uFEFF';
  const hdrs = ['Fecha','Turno','Tipo','Categoría','Proveedor','₡','$','Método','Caja','Estado','Referencia','Notas'];
  const rows = movs.map(m=>[
    m.fecha,m.turno||'',m.tipo,m.categoria,m.proveedor_nombre||'',
    m.monto_crc||0,m.monto_usd||0,m.metodo||'',m.caja_origen||'',
    m.estado||'',m.referencia||'',m.notas||''
  ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = BOM + [hdrs.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `satori_resumen_${mesStr}.csv`;
  a.click();
  showToast('✓ Exportado','success');
}

function buildCatsList() {
  const el = document.getElementById('cats-list');
  if (!el) return;
  const tipos = ['Ingreso','Egreso - Mercadería','Egreso - Personal','Egreso - Operativo','Egreso - Socios','Traspaso'];
  let html = '';
  tipos.forEach(tipo => {
    const cats = CATS_DATA.filter(c => c.tipo === tipo);
    if (!cats.length) return;
    html += `<div style="margin-bottom:14px">
      <div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#888;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)">${tipo}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${cats.map(c => `
          <div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid ${c.activo!==false&&c.activo!=='false'?'var(--border)':'#f0c0c0'};border-radius:2px;background:${c.activo!==false&&c.activo!=='false'?'transparent':'#fff5f5'}">
            <span style="font-size:10px;color:${c.activo!==false&&c.activo!=='false'?'var(--ink)':'#ccc'}">${c.nombre}</span>
            <button style="background:none;border:none;cursor:pointer;font-size:11px;color:#ccc;padding:0 2px;line-height:1" onclick="toggleCat('${c.id}','${c.nombre}')">
              ${c.activo!==false&&c.activo!=='false'?'×':'↺'}
            </button>
          </div>
        `).join('')}
      </div>
    </div>`;
  });
  el.innerHTML = html || '<div style="font-size:11px;color:#888">Sin categorías. Sincronizá para cargar las predeterminadas.</div>';
}

async function addCategoria() {
  const tipo   = document.getElementById('cat-tipo-nuevo')?.value;
  const nombre = document.getElementById('cat-nombre-nuevo')?.value.trim();
  if (!tipo || !nombre) { showToast('Completá tipo y nombre','error'); return; }
  const data = { id:Date.now().toString(), tipo, nombre, activo:true };
  CATS_DATA.push(data);
  localStorage.setItem('caja_cats', JSON.stringify(CATS_DATA));
  document.getElementById('cat-nombre-nuevo').value = '';
  const r = await apiPost({ action:'saveCatCaja', data:JSON.stringify(data) });
  showToast(r?.ok ? '✓ Categoría guardada' : '⚠ Guardado local','success');
  buildCatsList();
}

async function toggleCat(id, nombre) {
  const idx = CATS_DATA.findIndex(c=>String(c.id)===String(id));
  if (idx < 0) return;
  const activo = CATS_DATA[idx].activo === false || CATS_DATA[idx].activo === 'false';
  CATS_DATA[idx].activo = activo; // toggle
  localStorage.setItem('caja_cats', JSON.stringify(CATS_DATA));
  if (!activo) {
    await apiPost({ action:'deleteCatCaja', id });
  } else {
    await apiPost({ action:'saveCatCaja', data:JSON.stringify(CATS_DATA[idx]) });
  }
  buildCatsList();
}

function setModo(m) {
  MODO = m;
  localStorage.setItem('caja_modo', m);
  const badge = document.getElementById('modo-badge');
  if (badge) {
    badge.textContent = m.toUpperCase() + ' ▾';
    badge.style.color = m==='owner' ? 'var(--gold)' : m==='manager' ? '#7ec8a0' : '#888';
    badge.style.borderColor = m==='owner' ? '#3a2a0a' : m==='manager' ? '#1a3a1a' : '#2a2a2a';
  }
  buildNav();
}

function toggleModoMenu() {
  const menu = document.getElementById('modo-menu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  // Cerrar al hacer click afuera
  if (menu && menu.style.display === 'block') {
    setTimeout(() => {
      document.addEventListener('click', function handler(e) {
        if (!menu.contains(e.target) && e.target.id !== 'modo-badge') {
          menu.style.display = 'none';
        }
        document.removeEventListener('click', handler);
      });
    }, 10);
  }
}

function saveTipoCambio() {
  const val = parseFloat(document.getElementById('cfg-tc')?.value);
  if (!val || val < 1) { showToast('Ingresá un tipo de cambio válido','error'); return; }
  TIPO_CAMBIO = val;
  localStorage.setItem('caja_tipo_cambio', String(val));
  const st = document.getElementById('cfg-tc-status');
  if (st) st.innerHTML = '<span style="color:var(--green)">✓ ₡'+val.toLocaleString('es-CR')+' por $1 · aplica a cierres futuros</span>';
  showToast('✓ Tipo de cambio actualizado','success');
}

function saveCFInicial() {
  const val    = parseFloat(document.getElementById('cfg-cf-inicial')?.value     || '0');
  const valUSD = parseFloat(document.getElementById('cfg-cf-inicial-usd')?.value || '0');
  CF_SALDO_INICIAL     = val;
  CF_SALDO_INICIAL_USD = valUSD;
  localStorage.setItem('caja_cf_inicial',     String(val));
  localStorage.setItem('caja_cf_inicial_usd', String(valUSD));
  const st = document.getElementById('cfg-cf-status');
  if (st) st.innerHTML = '<span style="color:var(--green)">✓ Saldo inicial: '+fi(val)+(valUSD?' / '+fd(valUSD):'')+'</span>';
  showToast('✓ Saldo inicial de CF registrado','success');
}

async function testConexion() {
  const status = document.getElementById('cfg-status');
  status.textContent = '⟳ Probando...';
  const r = await apiGet({ action:'ping' });
  status.textContent = r?.ok ? '✓ Conectado · ' + r.msg : '✗ Sin conexión';
  status.style.color = r?.ok ? 'var(--green)' : 'var(--red)';
}

let ingresosActuales = [];

function addIngreso() {

      <span class="monto-prefix">₡</span>
      <input class="form-input" type="number" placeholder="0"
        oninput="ingresosActuales[${idx}].monto_crc=+this.value;recalcTotales()">
    </div>
    <div class="monto-wrap usd" style="width:140px">
      <span class="monto-prefix">$</span>
      <input class="form-input" type="number" placeholder="0"
        oninput="ingresosActuales[${idx}].monto_usd=+this.value;recalcTotales()">
    </div>
    <button class="btn btn-ghost btn-sm" onclick="removeIngreso(${idx})"
      style="color:var(--red);border-color:#f0b0b0">×</button>
  `;
  wrap.appendChild(div);
  document.getElementById('total-ingresos-bar').style.display = 'block';
  recalcTotales();
}

function removeIngreso(idx) {
  ingresosActuales[idx] = null;
  const el = document.getElementById('ingreso-' + idx);
  if (el) el.remove();
  const remaining = ingresosActuales.filter(i=>i);
  if (!remaining.length) document.getElementById('total-ingresos-bar').style.display = 'none';
  recalcTotales();
}
