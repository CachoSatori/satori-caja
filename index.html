function recalcCierre() {
  const v   = id => +document.getElementById(id)?.value || 0;
  const tc  = TIPO_CAMBIO || 530;
  const fi2 = n => '₡\u00a0' + Math.round(n||0).toLocaleString('es-CR');
  const fd2 = n => '$' + parseFloat(n||0).toFixed(2);

  // Leer datos de noche (mediodía ya viene del cierre parcial sellado)
  const vnCRC = v('ct-vn-crc'), vnUSD = v('ct-vn-usd');
  const pnCRC = v('ct-pn-crc'), enCRC = v('ct-en-crc');

  // También leer datos de mediodía si están en formulario (fase 1 aún no confirmada)
  const vmCRC = v('ct-vm-crc'), vmUSD = v('ct-vm-usd');
  const pmCRC = v('ct-pm-crc'), emCRC = v('ct-em-crc');

  const sepDCRC = v('ct-sep-d-crc'), sepDUSD = v('ct-sep-d-usd');
  const sepRCRC = v('ct-sep-r-crc'), sepRUSD = v('ct-sep-r-usd');
  const remCRC  = v('ct-rem-crc'),   remUSD  = v('ct-rem-usd');

  const efRealMCRC = vmCRC - (vmUSD * tc);
  const efRealNCRC = vnCRC - (vnUSD * tc);

  // Actualizar displays de efectivo real mediodía (fase 1)
  const vmRealEl  = document.getElementById('ct-vm-real');
  const vmFormEl  = document.getElementById('ct-vm-formula');
  if (vmRealEl && (vmCRC || vmUSD)) {
    vmRealEl.textContent = fi2(efRealMCRC);
    if (vmFormEl) vmFormEl.textContent = vmUSD > 0
      ? fi2(vmCRC) + ' − ($' + vmUSD + ' × ₡' + tc.toLocaleString('es-CR') + ')'
      : 'Sin dólares — total directo';
  }

  // Actualizar displays de efectivo real noche
  const vnRealEl = document.getElementById('ct-vn-real');
  const vnFormEl = document.getElementById('ct-vn-formula');
  if (vnRealEl && (vnCRC || vnUSD)) {
    vnRealEl.textContent = fi2(efRealNCRC);
    if (vnFormEl) vnFormEl.textContent = vnUSD > 0
      ? fi2(vnCRC) + ' − ($' + vnUSD + ' × ₡' + tc.toLocaleString('es-CR') + ')'
      : 'Sin dólares — total directo';
  }

  // Actualizar totales de conteo
  const totalCRC = sepDCRC + sepRCRC + remCRC;
  const totalUSD = sepDUSD + sepRUSD + remUSD;
  const tcEl = document.getElementById('ct-total-crc');
  const tuEl = document.getElementById('ct-total-usd');
  if (tcEl) tcEl.textContent = fi2(totalCRC);
  if (tuEl) tuEl.textContent = totalUSD > 0 ? fd2(totalUSD) : '';

  // Verificación final solo si hay conteo físico
  if (!document.getElementById('ct-rem-crc')) return;

  // Obtener datos de mediodía (del cierre parcial sellado o del formulario actual)
  const hoy = document.getElementById('ct-fecha')?.value || new Date().toISOString().slice(0,10);
  const cierreParcial = CIERRES_TURNO.find(ct => ct.fecha === hoy && ct.tipo === 'parcial_mediodia');
  const mCRC = cierreParcial ? (cierreParcial.ef_real_m_crc||0) : efRealMCRC;
  const mProp = cierreParcial ? (cierreParcial.propinas_m_crc||0) : pmCRC;
  const mOtros = cierreParcial ? (cierreParcial.otros_m_crc||0) : emCRC;
  const mUSD = cierreParcial ? (cierreParcial.vm_usd||0) : vmUSD;

  // CF anterior
  const ultCierre = [...CIERRES_TURNO]
    .filter(ct => ct.tipo !== 'parcial_mediodia')
    .sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''))[0];
  const tieneRem = ultCierre && (ultCierre.remanente_crc > 0 || ultCierre.total_contado_crc > 0);
  const cfAntCRC = tieneRem ? (ultCierre.remanente_crc||0) : (CF_SALDO_INICIAL||0);

  // Pagos efectivo del día
  const pagosEfCRC = MOVIMIENTOS
    .filter(m => m.fecha===hoy && m.tipo==='Egreso' && m.metodo==='Efectivo' &&
                 m.estado==='Pagado' && m.categoria==='Egreso - Mercadería')
    .reduce((s,m) => s+(m.monto_crc||0), 0);

  const deberiaHaberCRC = cfAntCRC + mCRC + efRealNCRC - mProp - mOtros - pnCRC - enCRC - pagosEfCRC;
  const deberiaHaberUSD = mUSD + vnUSD;
  const difCRC = totalCRC - deberiaHaberCRC;
  const difUSD = totalUSD - deberiaHaberUSD;
  const cuadra = Math.abs(difCRC) < 500 && (deberiaHaberUSD === 0 || Math.abs(difUSD) < 0.5);

  const secVer  = document.getElementById('ct-verificacion');
  const body    = document.getElementById('ct-ver-body');
  const pill    = document.getElementById('ct-ver-pill');
  const ajWrap  = document.getElementById('ct-ajuste-wrap');

  const hayDatos = totalCRC > 0 || (vnCRC > 0);
  if (!secVer) return;
  secVer.style.display = hayDatos ? 'block' : 'none';
  if (!hayDatos) return;

  secVer.style.borderColor  = cuadra ? '#639922' : '#E24B4A';
  const headEl = secVer.querySelector('.sec-head');
  if (headEl) headEl.style.background = cuadra ? '#EAF3DE' : '#FCEBEB';
  if (pill) {
    pill.textContent = cuadra ? '✓ Cuadra' : '⚠ Diferencia';
    pill.style.background = cuadra ? '#EAF3DE' : '#FCEBEB';
    pill.style.color = cuadra ? '#27500A' : '#791F1F';
  }
  if (ajWrap) ajWrap.style.display = cuadra ? 'none' : 'block';

  if (!body) return;
  body.innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:14px">
      <div class="vcol">
        <div class="vhead">Lo que debería haber</div>
        <div class="vrow"><span style="color:#888">CF inicio del día</span><span style="font-weight:500">${fi2(cfAntCRC)}</span></div>
        <div class="vrow" style="background:#f0f0ed">
          <span style="color:#444;display:flex;align-items:center;gap:5px"><i class="ti ti-circle-check" style="color:#27500A;font-size:12px"></i>Ef. real mediodía</span>
          <span style="font-weight:500;color:#3C3489">+${fi2(mCRC)}</span>
        </div>
        <div class="vrow"><span style="color:#888">+ Ef. real noche</span><span style="font-weight:500;color:#3C3489">+${fi2(efRealNCRC)}</span></div>
        ${(mProp+mOtros+pnCRC+enCRC) > 0 ? `<div class="vrow"><span style="color:#888">− Propinas y egresos</span><span style="font-weight:500;color:#E24B4A">−${fi2(mProp+mOtros+pnCRC+enCRC)}</span></div>` : ''}
        ${pagosEfCRC > 0 ? `<div class="vrow"><span style="color:#888">− Pagos efectivo proveedores</span><span style="font-weight:500;color:#E24B4A">−${fi2(pagosEfCRC)}</span></div>` : ''}
        <div class="vtot"><span style="font-size:11px;color:#888">Total debería haber</span><span style="font-size:16px;font-weight:500">${fi2(deberiaHaberCRC)}</span></div>
      </div>
      <div class="vcol">
        <div class="vhead">Lo que contaste</div>
        <div class="vrow"><span style="color:#888">Caja Diaria mañana</span><span style="font-weight:500">${fi2(sepDCRC)}${sepDUSD?' / '+fd2(sepDUSD):''}</span></div>
        <div class="vrow"><span style="color:#888">Caja Registradora</span><span style="font-weight:500">${fi2(sepRCRC)}${sepRUSD?' / '+fd2(sepRUSD):''}</span></div>
        <div class="vrow"><span style="color:#888">Remanente CF</span><span style="font-weight:500;color:#3C3489">${fi2(remCRC)}${remUSD?' / '+fd2(remUSD):''}</span></div>
        <div class="vtot"><span style="font-size:11px;color:#888">Total contado</span><span style="font-size:16px;font-weight:500">${fi2(totalCRC)}</span></div>
      </div>
    </div>
    <div style="background:${cuadra?'#EAF3DE':'#FCEBEB'};border:${cuadra?'1.5px solid #639922':'1.5px solid #E24B4A'};border-radius:8px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:${cuadra?'#27500A':'#791F1F'};margin-bottom:4px">Diferencia ₡</div>
        <div style="font-size:32px;font-weight:500;color:${cuadra?'#27500A':'#E24B4A'}">${difCRC>=0?'+':''}${fi2(difCRC)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:500;color:${cuadra?'#27500A':'#E24B4A'}">${cuadra?'Cuadra correctamente':difCRC>0?'↑ Hay más del esperado':'↓ Falta efectivo'}</div>
        ${deberiaHaberUSD > 0 ? `<div style="font-size:11px;color:#888;margin-top:4px">$ Dif: ${difUSD>=0?'+':''}${fd2(difUSD)}</div>` : ''}
      </div>
    </div>`;
}

async function confirmarCierreParcial() {
  const manager = document.getElementById('ct-manager')?.value;
  const fecha   = document.getElementById('ct-fecha')?.value;
  if (!manager) { showToast('Seleccioná el encargado', 'error'); return; }

  // Bloquear duplicado: ya hay cierre parcial mediodía de este día
  const dupParcial = CIERRES_TURNO.find(ct => ct.fecha === fecha && ct.tipo === 'parcial_mediodia');
  if (dupParcial) {
    showToast('⚠ Ya hay un cierre de mediodía del ' + fecha + '. No se puede duplicar.', 'error');
    return;
  }

  const v = id => +document.getElementById(id)?.value || 0;
  const tc = TIPO_CAMBIO || 530;
  const vmCRC = v('ct-vm-crc'), vmUSD = v('ct-vm-usd');
  if (!vmCRC && !vmUSD) { showToast('Ingresá las ventas de mediodía', 'error'); return; }

  const efRealMCRC = vmCRC - (vmUSD * tc);
  const data = {
    id: 'cp_' + Date.now(), fecha, manager,
    tipo: 'parcial_mediodia',
    tipo_cambio: tc,
    vm_crc: vmCRC, vm_usd: vmUSD, ef_real_m_crc: efRealMCRC,
    propinas_m_crc: v('ct-pm-crc'), otros_m_crc: v('ct-em-crc'),
    timestamp: new Date().toISOString()
  };

  showToast('Guardando cierre mediodía...', '');
  const r = await apiPost({ action: 'saveCierreTurno', data: JSON.stringify(data) });
  if (r?.ok) {
    CIERRES_TURNO.push(data);
    localStorage.setItem('caja_cierres', JSON.stringify(CIERRES_TURNO));
    showToast('✓ Cierre mediodía confirmado y sellado', 'success');
    renderCierreTurno(document.getElementById('view-cierre'));
  } else {
    showToast('✗ Error al guardar en Sheets. Reintentá.', 'error');
  }
}

async function confirmarCierreTurnoManager() {
  const manager = document.getElementById('ct-manager')?.value;
  const fecha   = document.getElementById('ct-fecha')?.value;
  if (!manager) { showToast('Seleccioná el encargado', 'error'); return; }

  // Bloquear duplicado: ya hay cierre completo de este día
  const dupCompleto = CIERRES_TURNO.find(ct => ct.fecha === fecha && ct.tipo === 'completo');
  if (dupCompleto) {
    showToast('⚠ Ya hay un cierre completo del ' + fecha + '. No se puede duplicar.', 'error');
    return;
  }

  const ajWrap = document.getElementById('ct-ajuste-wrap');
  if (ajWrap && ajWrap.style.display !== 'none') {
    const motivo = document.getElementById('ct-ajuste-motivo')?.value?.trim();
    if (!motivo) { showToast('El motivo de la diferencia es obligatorio', 'error'); return; }
  }

  const v = id => +document.getElementById(id)?.value || 0;
  const tc = TIPO_CAMBIO || 530;

  // Datos de mediodía desde cierre parcial sellado
  const cierreParcial = CIERRES_TURNO.find(ct => ct.fecha === fecha && ct.tipo === 'parcial_mediodia');
  if (!cierreParcial) { showToast('Falta confirmar el cierre de mediodía', 'error'); return; }

  const vnCRC = v('ct-vn-crc'), vnUSD = v('ct-vn-usd');
  const efRealNCRC = vnCRC - (vnUSD * tc);
  const sepDCRC = v('ct-sep-d-crc'), sepDUSD = v('ct-sep-d-usd');
  const sepRCRC = v('ct-sep-r-crc'), sepRUSD = v('ct-sep-r-usd');
  const remCRC  = v('ct-rem-crc'),   remUSD  = v('ct-rem-usd');
  const totalContadoCRC = sepDCRC + sepRCRC + remCRC;
  const totalContadoUSD = sepDUSD + sepRUSD + remUSD;

  const ultCierre = [...CIERRES_TURNO]
    .filter(ct => ct.tipo !== 'parcial_mediodia')
    .sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''))[0];
  const tieneRem = ultCierre && (ultCierre.remanente_crc > 0 || ultCierre.total_contado_crc > 0);
  const cfAntCRC = tieneRem ? (ultCierre.remanente_crc||0) : (CF_SALDO_INICIAL||0);

  const pagosEfCRC = MOVIMIENTOS
    .filter(m => m.fecha===fecha && m.tipo==='Egreso' && m.metodo==='Efectivo' &&
                 m.estado==='Pagado' && m.categoria==='Egreso - Mercadería')
    .reduce((s,m) => s+(m.monto_crc||0), 0);

  const pnCRC = v('ct-pn-crc'), enCRC = v('ct-en-crc');
  const deberiaHaberCRC = cfAntCRC + (cierreParcial.ef_real_m_crc||0) + efRealNCRC
    - (cierreParcial.propinas_m_crc||0) - (cierreParcial.otros_m_crc||0)
    - pnCRC - enCRC - pagosEfCRC;
  const difCRC = totalContadoCRC - deberiaHaberCRC;
  const difUSD  = totalContadoUSD - ((cierreParcial.vm_usd||0) + vnUSD);

  const ts = new Date().toISOString();
  const data = {
    id: 'cd_' + Date.now(), fecha, manager, tipo: 'completo',
    tipo_cambio: tc,
    vm_crc: cierreParcial.vm_crc, vm_usd: cierreParcial.vm_usd,
    ef_real_m_crc: cierreParcial.ef_real_m_crc,
    propinas_m_crc: cierreParcial.propinas_m_crc, otros_m_crc: cierreParcial.otros_m_crc,
    vn_crc: vnCRC, vn_usd: vnUSD, ef_real_n_crc: efRealNCRC,
    propinas_n_crc: pnCRC, otros_n_crc: enCRC,
    sep_diaria_crc: sepDCRC, sep_diaria_usd: sepDUSD,
    sep_reg_crc: sepRCRC, sep_reg_usd: sepRUSD,
    remanente_crc: remCRC, remanente_usd: remUSD,
    total_contado_crc: totalContadoCRC, total_contado_usd: totalContadoUSD,
    cf_anterior_crc: cfAntCRC, deberia_haber_crc: deberiaHaberCRC,
    diferencia_crc: difCRC, diferencia_usd: difUSD,
    notas: document.getElementById('ct-notas')?.value || '',
    timestamp: ts
  };

  // Movimientos automáticos
  const movs = [];
  const push = (suffix, tipo, cat, sub, crc, usd, nota) => movs.push({
    id: data.id+suffix, fecha, turno: suffix.includes('m') ? 'Mediodía' : 'Noche',
    tipo, categoria: cat, subcategoria: sub, empleado_nombre: manager,
    monto_crc: crc, monto_usd: usd||0,
    metodo:'Efectivo', caja_origen:'Caja Fuerte', estado:'Pagado',
    notas: nota, timestamp: ts
  });
  if (cierreParcial.ef_real_m_crc||cierreParcial.vm_usd)
    push('_vm','Ingreso','Ingreso','Ventas efectivo mediodía',cierreParcial.ef_real_m_crc,cierreParcial.vm_usd,`PoS: ${cierreParcial.vm_crc}`);
  if (efRealNCRC||vnUSD)
    push('_vn','Ingreso','Ingreso','Ventas efectivo noche',efRealNCRC,vnUSD,`PoS: ${vnCRC}`);
  if (cierreParcial.propinas_m_crc)
    push('_pm','Egreso','Egreso - Personal','Propinas por tarjeta',cierreParcial.propinas_m_crc,0,'Cierre · '+manager);
  if (pnCRC)
    push('_pn','Egreso','Egreso - Personal','Propinas por tarjeta',pnCRC,0,'Cierre · '+manager);
  if (cierreParcial.otros_m_crc)
    push('_em','Egreso','Egreso - Operativo','Otros egresos turno',cierreParcial.otros_m_crc,0,'Cierre · '+manager);
  if (enCRC)
    push('_en','Egreso','Egreso - Operativo','Otros egresos turno',enCRC,0,'Cierre · '+manager);

  // Ajuste si hay diferencia
  const ajWrapFin = document.getElementById('ct-ajuste-wrap');
  if (ajWrapFin && ajWrapFin.style.display !== 'none') {
    const ajTipo  = document.getElementById('ct-ajuste-tipo')?.value || 'Faltante';
    const ajMotiv = document.getElementById('ct-ajuste-motivo')?.value?.trim() || '';
    movs.push({ id: data.id+'_ajuste', fecha, turno:'Cierre', tipo:'Ajuste', categoria:'Ajuste',
      subcategoria: ajTipo, empleado_nombre: manager, monto_crc: difCRC, monto_usd:0,
      metodo:'Efectivo', caja_origen:'Caja Fuerte', estado:'Pagado',
      notas: ajTipo+' · '+ajMotiv, timestamp: ts });
  }

  showToast('Guardando cierre completo...', '');
  const r = await apiPost({ action:'saveCierreTurno', data: JSON.stringify(data) });
  if (!r?.ok) { showToast('✗ Error al guardar en Sheets. Reintentá.', 'error'); return; }

  // Guardar movimientos
  movs.forEach(m => MOVIMIENTOS.push(m));
  for (const m of movs) await apiPost({ action:'saveMovimiento', data: JSON.stringify(m) });

  CIERRES_TURNO.push(data);
  localStorage.setItem('caja_cierres',     JSON.stringify(CIERRES_TURNO));
  localStorage.setItem('caja_movimientos', JSON.stringify(MOVIMIENTOS));

  showToast('✓ Cierre del día guardado', 'success');
  APERTURA_CONFIRMADA = false;
  APERTURA_MONTO_CRC  = 0;
  APERTURA_MONTO_USD  = 0;
  localStorage.removeItem('caja_apertura_activa');
  localStorage.removeItem('caja_apertura_crc');
  localStorage.removeItem('caja_apertura_usd');
  // Mostrar pantalla de confirmación estática
  renderCierreConfirmado(document.getElementById('view-cierre'), data);
}





</script>
